<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1A1A2E">
  <meta name="robots" content="noindex, nofollow">
  <title>POS · AURA CAFE Staff</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="../admin/shared.css">
    <link rel="stylesheet" href="/css/pos.css">
  <style>
/* ══ POS — Mobile-First Page Styles ══ */

/* Page header */
.pos-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: clamp(10px, 2vw, 14px) clamp(12px, 3vw, 20px);
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  gap: 10px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 50;
  height: clamp(48px, 6vh, 60px);
  box-sizing: border-box;
}
.pos-brand {
  font-family: var(--fd);
  font-size: clamp(0.9rem, 3.5vw, 1.2rem);
  color: var(--chrome-light);
}
.pos-brand b { color: var(--chrome-silver); letter-spacing: 2px; }
.pos-staff-info {
  display: flex;
  gap: 10px;
  align-items: center;
  font-size: clamp(0.6rem, 2vw, 0.75rem);
  color: var(--txt);
  flex-wrap: wrap;
  justify-content: flex-end;
}
.pos-staff-info b { color: var(--chrome-steel); font-family: var(--fm); font-size: clamp(0.65rem, 2vw, 0.8rem); }
.logout-btn {
  background: transparent;
  color: var(--danger-muted);
  border: 1px solid var(--border);
  padding: clamp(6px, 1.5vw, 8px) clamp(10px, 2vw, 14px);
  border-radius: 6px;
  cursor: pointer;
  font-size: clamp(0.6rem, 2vw, 0.72rem);
  font-weight: 600;
  font-family: var(--fb);
  min-height: 36px;
  -webkit-tap-highlight-color: transparent;
  transition: all .2s;
}
.logout-btn:hover { background: rgba(75,85,99,.2); }
.logout-btn:active { transform: scale(0.95); }

/* Main layout — mobile-first: stacked */
.pos-main {
  display: grid;
  grid-template-columns: 1fr;
  flex: 1;
  min-height: 100dvh;
  overflow: hidden;
}

/* Menu panel */
.menu-panel {
  padding: clamp(10px, 2vw, 16px);
  overflow-y: auto;
  overscroll-behavior-y: contain;
  -webkit-overflow-scrolling: touch;
}
.menu-search {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--chrome-light);
  padding: clamp(10px, 2vw, 12px) clamp(10px, 2.5vw, 14px);
  border-radius: 8px;
  font-size: clamp(0.8rem, 2.5vw, 0.9rem);
  font-family: var(--fb);
  min-height: 44px;
  margin-bottom: 10px;
  -webkit-appearance: none;
  appearance: none;
  inputmode: search;
}
.menu-search:focus {
  outline: none;
  border-color: var(--chrome-silver);
  box-shadow: 0 0 0 2px rgba(201,214,223,.15);
}
.menu-search::placeholder { color: var(--txt); }
.category-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  overflow-x: auto;
  padding-bottom: 6px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-x: contain;
  scrollbar-width: none;
}
.category-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  background: var(--surface);
  color: var(--chrome-light);
  border: 1px solid var(--border);
  padding: clamp(8px, 2vw, 10px) clamp(12px, 2.5vw, 16px);
  border-radius: 20px;
  cursor: pointer;
  font-size: clamp(0.7rem, 2.5vw, 0.78rem);
  font-weight: 600;
  white-space: nowrap;
  font-family: var(--fb);
  min-height: 36px;
  -webkit-tap-highlight-color: transparent;
  transition: all .2s;
}
.cat-tab.active {
  background: var(--chrome-silver);
  color: var(--bg);
  border-color: var(--chrome-silver);
}
.cat-tab:active { transform: scale(0.95); }
.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(clamp(120px, 40vw, 150px), 1fr));
  gap: clamp(8px, 2vw, 12px);
}
.menu-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: clamp(10px, 2vw, 14px);
  border-radius: 10px;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  flex-direction: column;
  min-height: clamp(90px, 18vh, 120px);
  -webkit-tap-highlight-color: transparent;
}
.menu-tile:hover { border-color: var(--chrome-silver); transform: translateY(-2px); }
.menu-tile:active { transform: scale(0.97); background: rgba(201,214,223,.05); }
.menu-tile .name {
  font-size: clamp(0.75rem, 2.5vw, 0.85rem);
  font-weight: 600;
  margin-bottom: 4px;
  line-height: 1.3;
}
.menu-tile .cat {
  font-size: clamp(0.6rem, 2vw, 0.68rem);
  color: var(--txt);
  margin-bottom: auto;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.menu-tile .price {
  font-family: var(--fm);
  color: var(--chrome-light);
  font-size: clamp(0.75rem, 2.5vw, 0.85rem);
  font-weight: 700;
  margin-top: 8px;
}
.menu-tile.unavailable { opacity: .35; pointer-events: none; }

/* Cart panel — mobile: fixed overlay */
.cart-panel {
  background: var(--surface2);
  display: flex;
  flex-direction: column;
  position: fixed;
  inset: clamp(48px, 6vh, 60px) 0 0;
  transform: translateX(105%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  z-index: 40;
  overscroll-behavior-y: contain;
  -webkit-overflow-scrolling: touch;
}
.cart-panel.open { transform: translateX(0); }
.cart-top {
  padding: clamp(10px, 2vw, 14px) clamp(12px, 3vw, 16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.cart-top h3 {
  font-family: var(--fd);
  font-size: clamp(0.9rem, 3vw, 1.1rem);
  color: var(--chrome-light);
}
.table-select {
  background: var(--surface);
  color: var(--chrome-light);
  border: 1px solid var(--border);
  padding: clamp(8px, 2vw, 10px) clamp(10px, 2.5vw, 12px);
  border-radius: 6px;
  font-size: clamp(0.7rem, 2.5vw, 0.78rem);
  cursor: pointer;
  font-family: var(--fb);
  min-height: 36px;
  -webkit-appearance: none;
  appearance: none;
}
.cart-items {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior-y: contain;
  padding: clamp(8px, 2vw, 12px) clamp(10px, 2.5vw, 16px);
}
.cart-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: clamp(8px, 2vw, 12px) 0;
  border-bottom: 1px dashed var(--border-light);
  gap: 8px;
}
.cart-row .info { flex: 1; min-width: 0; }
.cart-row .info .nm {
  font-size: clamp(0.75rem, 2.5vw, 0.85rem);
  font-weight: 600;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cart-row .info .pr {
  font-family: var(--fm);
  color: var(--txt);
  font-size: clamp(0.65rem, 2vw, 0.72rem);
}
.qty-ctrl { display: flex; gap: 6px; align-items: center; }
.qty-btn {
  background: var(--surface);
  color: var(--chrome-light);
  border: 1px solid var(--border);
  width: clamp(40px, 10vw, 44px);
  height: clamp(40px, 10vw, 44px);
  min-width: 40px;
  min-height: 40px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 700;
  font-size: clamp(1rem, 3vw, 1.2rem);
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: all .15s;
  font-family: var(--fb);
}
.qty-btn:hover { background: var(--chrome-silver); color: var(--bg); }
.qty-btn:active { transform: scale(0.9); }
.qty-num {
  font-family: var(--fm);
  min-width: clamp(28px, 7vw, 36px);
  text-align: center;
  font-size: clamp(0.8rem, 2.5vw, 0.9rem);
  font-weight: 700;
}
.cart-empty {
  text-align: center;
  color: var(--txt);
  padding: clamp(30px, 8vw, 50px) 20px;
  font-size: clamp(0.75rem, 2.5vw, 0.85rem);
  font-style: italic;
}

/* Cart summary */
.cart-summary {
  background: var(--bg);
  padding: clamp(12px, 2vw, 16px) clamp(12px, 3vw, 16px);
  border-top: 1px solid var(--border);
  padding-bottom: calc(clamp(12px, 2vw, 16px) + var(--safe-bottom));
}
.sum-row {
  display: flex;
  justify-content: space-between;
  font-size: clamp(0.75rem, 2.5vw, 0.85rem);
  margin-bottom: 6px;
  color: var(--txt);
}
.sum-row.total {
  font-size: clamp(0.9rem, 3vw, 1.05rem);
  color: var(--chrome-light);
  font-weight: 700;
  border-top: 1px solid var(--border);
  padding-top: 10px;
  margin-top: 10px;
}
.sum-row .val { font-family: var(--fm); }
.pay-methods {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin: 10px 0;
}
.pay-btn {
  padding: clamp(10px, 2vw, 12px) 6px;
  background: var(--surface);
  color: var(--chrome-light);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: clamp(0.7rem, 2.5vw, 0.78rem);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
  font-family: var(--fb);
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
  transition: all .15s;
}
.pay-btn.active {
  background: var(--chrome-silver);
  color: var(--bg);
  border-color: var(--chrome-silver);
}
.pay-btn:active { transform: scale(0.95); }
.btn-checkout {
  width: 100%;
  background: linear-gradient(135deg, var(--chrome-silver) 0%, var(--chrome-steel) 100%);
  color: var(--bg);
  border: 0;
  padding: clamp(14px, 2vw, 16px);
  border-radius: 10px;
  font-size: clamp(0.8rem, 2.5vw, 0.9rem);
  font-weight: 700;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-family: var(--fb);
  min-height: 48px;
  -webkit-tap-highlight-color: transparent;
  margin-top: 4px;
  transition: filter .2s, transform .1s;
}
.btn-checkout:hover { filter: brightness(1.1); }
.btn-checkout:active { transform: scale(0.98); }
.btn-checkout:disabled { opacity: .35; cursor: not-allowed; filter: grayscale(.4); }
.btn-print {
  width: 100%;
  background: transparent;
  color: var(--txt);
  border: 1px solid var(--border);
  padding: clamp(8px, 2vw, 10px);
  border-radius: 6px;
  font-size: clamp(0.7rem, 2vw, 0.75rem);
  cursor: pointer;
  font-family: var(--fb);
  min-height: 36px;
  margin-top: 6px;
  -webkit-tap-highlight-color: transparent;
  transition: all .15s;
}
.btn-print:hover { border-color: var(--chrome-silver); color: var(--chrome-silver); }

/* Wallet lookup */
.wallet-lookup-section { padding: 0 clamp(10px, 2.5vw, 16px); margin-bottom: 8px; }
.wallet-lookup-row {
  display: flex;
  gap: 6px;
  align-items: center;
}
.wallet-phone-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--chrome-light);
  padding: clamp(8px, 2vw, 10px) clamp(10px, 2.5vw, 14px);
  border-radius: 8px;
  font-size: clamp(0.8rem, 2.5vw, 0.9rem);
  font-family: var(--fm);
  min-height: 44px;
  -webkit-appearance: none;
  appearance: none;
  inputmode: tel;
  autocomplete: tel;
}
.wallet-phone-input:focus {
  outline: none;
  border-color: var(--chrome-silver);
  box-shadow: 0 0 0 2px rgba(201,214,223,.15);
}
.wallet-phone-input::placeholder { color: var(--txt); }
.wallet-lookup-btn {
  background: var(--chrome-silver);
  color: var(--bg);
  border: none;
  padding: clamp(8px, 2vw, 10px) clamp(12px, 2.5vw, 16px);
  border-radius: 8px;
  cursor: pointer;
  font-size: clamp(0.7rem, 2vw, 0.78rem);
  font-weight: 600;
  font-family: var(--fb);
  min-height: 44px;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  transition: all .15s;
}
.wallet-lookup-btn:active { transform: scale(0.95); }

/* Modal */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
  overscroll-behavior: contain;
}
.modal.show { display: flex; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: clamp(20px, 4vw, 28px);
  border-radius: 12px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}
.modal-box h3 {
  font-family: var(--fd);
  color: var(--chrome-light);
  margin-bottom: 12px;
  font-size: clamp(1rem, 3.5vw, 1.3rem);
}
.modal-box p {
  color: var(--txt);
  font-size: clamp(0.75rem, 2.5vw, 0.85rem);
  margin-bottom: 14px;
}
.modal-box .order-id {
  font-family: var(--fm);
  color: var(--chrome-steel);
  font-size: clamp(1rem, 3vw, 1.2rem);
  font-weight: 700;
  margin: 12px 0;
}
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 14px;
  flex-wrap: wrap;
}
.modal-actions button {
  padding: clamp(10px, 2vw, 12px) clamp(16px, 3vw, 24px);
  border-radius: 8px;
  border: 0;
  cursor: pointer;
  font-weight: 600;
  font-size: clamp(0.7rem, 2.5vw, 0.8rem);
  font-family: var(--fb);
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
  flex: 1;
  min-width: 120px;
}

/* ══ RESPONSIVE ══ */

/* Tablet+: side-by-side layout */
@media (min-width: 769px) {
  .pos-main {
    grid-template-columns: 1fr 420px;
  }
  .cart-panel {
    position: static;
    transform: none;
    max-height: calc(100dvh - clamp(48px, 6vh, 60px));
  }
  .menu-grid {
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  }
  .wallet-lookup-section {
    padding: 0;
  }
  .cart-summary {
    padding-bottom: 16px;
  }
}

/* Desktop */
@media (min-width: 1024px) {
  .menu-grid {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  }
}

/* Accessibility */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}


/* ══ Skeleton Loading ══ */
.skeleton-row td { padding: 16px !important; border-bottom: 1px solid var(--border); }
.skeleton-line { height: 14px; background: linear-gradient(90deg, var(--border) 25%, rgba(255,255,255,.06) 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 6px; margin-bottom: 8px; width: 80%; }
.skeleton-line.short { width: 50%; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

</style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<div class="sidebar" id="sidebar" style="display:none">
  <div class="sb-logo">
    <div class="sb-logo-text">AURA</div>
    <div class="sb-logo-sub">CAFE POS</div>
  </div>
  <nav class="sb-nav">
    <a href="../admin/dashboard.html" class="sb-item"><span class="icon">📊</span>Dashboard</a>
    <a href="../admin/orders.html" class="sb-item"><span class="icon">📦</span>Đơn hàng</a>
    <a href="reservations.html" class="sb-item"><span class="icon">📅</span>Đặt bàn</a>
    <a href="menu.html" class="sb-item"><span class="icon">☕</span>Thực đơn</a>
    <a href="staff.html" class="sb-item"><span class="icon">👥</span>Nhân viên</a>
    <a href="pos.html" class="sb-item active"><span class="icon">🖥️</span>POS</a>
    <a href="checkin-approve.html" class="sb-item"><span class="icon">✅</span>Check-in</a>
    <a href="../index.html" class="sb-item"><span class="icon">🏠</span>Về trang chủ</a>
  </nav>

  </div>
</div>
<div class="sb-overlay" id="sbOverlay"></div>
  <header class="pos-header">
    <button class="hamburger" id="hamburger" style="background:none;border:none;color:var(--chrome-steel);font-size:clamp(1.2rem,4vw,1.6rem);cursor:pointer;padding:4px 8px;-webkit-tap-highlight-color:transparent;display:flex;align-items:center">☰</button>
 <div class="pos-brand"><b>AURA</b>&nbsp;POS</div>
    <div class="pos-staff-info">
      <div>Nhân viên: <b id="staffName">---</b></div>
      <div>Ca: <b id="shiftInfo">---</b></div>

    </div>
  </header>

  <main class="pos-main">
    <section class="menu-panel">

      <div class="category-tabs" id="categoryTabs">
        <button class="cat-tab active" data-cat="all">Tất cả</button>
      </div>
      <div class="menu-grid" id="menuGrid"></div>
    </section>

    <aside class="cart-panel" id="cartPanel">
      <div class="cart-top">
        <h3>Đơn #<span id="tableNo">--</span></h3>

          <button class="wallet-lookup-btn" id="btnWalletClear" style="background:rgba(75,85,99,.15);border-color:rgba(75,85,99,.3);color:var(--danger-muted);display:none">✕</button>

        <div class="pay-methods">

          <button class="pay-btn" data-pay="payos">📱 QR</button>

  </main>

  <div class="modal" id="successModal">

      <div class="modal-actions">
        <button class="btn-print" id="printReceipt" style="background:var(--chrome-silver);color:#000;border:0;padding:10px 20px">🖨 In hóa đơn</button>
        <button class="btn-checkout" id="newOrder" style="padding:10px 20px">Đơn mới</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { renderMemberWallet, lookupMember } from '/js/pos.js';

    const _IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);
    const API_BASE = _IS_LOCAL
      ? 'http://127.0.0.1:8787/api'
      : 'https://aura-space-worker.sadec-marketing-hub.workers.dev/api';

    const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    const fmt = (n) => new Intl.NumberFormat('vi-VN').format(Math.round(n)) + '₫';

    const state = {
      menu: [], categories: ['all'], cart: [], activeCat: 'all',
      table: '', payment: 'cash', staff: null, memberPhone: null,
    };

    // ── Wallet lookup ──
    async function handleWalletLookup() {
      const phone = document.getElementById('walletPhone').value.trim();
      const area = document.getElementById('walletPanelArea');
      const btn = document.getElementById('btnWalletLookup');
      if (!phone) return;
      btn.disabled = true; btn.textContent = '...';
      area.innerHTML = '';
      try {
        const member = await lookupMember(phone);
        area.innerHTML = renderMemberWallet(member);
        state.memberPhone = phone;
        document.getElementById('btnWalletClear').style.display = '';
      } catch (e) {
        area.innerHTML = `<div class="wallet-no-member">${esc(e.message)}</div>`;
        state.memberPhone = null;
      } finally {
        btn.disabled = false; btn.textContent = 'Tra ví';
      }
    }

    function clearWallet() {
      document.getElementById('walletPhone').value = '';
      document.getElementById('walletPanelArea').innerHTML = '';
      document.getElementById('btnWalletClear').style.display = 'none';
      state.memberPhone = null;
    }

    function auth() {
      const t = localStorage.getItem('aura_auth_token');
      if (!t) { window.location.href = '/admin/login.html'; return null; }
      return t;
    }

    async function loadStaff() {
      try {
        const r = await fetch(`${API_BASE}/auth/me`, { headers: { Authorization: `Bearer ${auth()}` }});
        const d = await r.json();
        if (!d.success || !['owner','staff'].includes(d.user?.role)) {
          window.location.href = '/admin/login.html'; return;
        }
        state.staff = d.user;
        document.getElementById('staffName').textContent = d.user.name || d.user.email;
        const hr = new Date().getHours();
        document.getElementById('shiftInfo').textContent = hr < 14 ? 'Sáng' : hr < 22 ? 'Chiều' : 'Tối';
      } catch (_e) { window.location.href = '/admin/login.html'; }
    }

    async function loadMenu() {
      try {
        const r = await fetch(`${API_BASE}/menu`);
        const d = await r.json();
        const items = d.items || d.data || d;
        state.menu = Array.isArray(items) ? items : [];
        const cats = new Set(['all']);
        state.menu.forEach(m => m.category && cats.add(m.category));
        state.categories = [...cats];
        renderCategories(); renderMenu(); loadTables();
      } catch (e) { console.error(e); }
    }

    async function loadTables() {
      try {
        const r = await fetch(`${API_BASE}/tables`);
        const d = await r.json();
        const tables = d.tables || d.data || d;
        const sel = document.getElementById('tableSelect');
        if (Array.isArray(tables)) {
          tables.forEach(t => {
            const o = document.createElement('option');
            o.value = t.id; o.textContent = `Bàn ${t.name || t.id}`;
            sel.appendChild(o);
          });
        }
      } catch (_e) {}
    }

    function renderCategories() {
      const el = document.getElementById('categoryTabs');
      el.innerHTML = state.categories.map(c =>
        `<button class="cat-tab ${c===state.activeCat?'active':''}" data-cat="${esc(c)}">${c==='all'?'Tất cả':esc(c)}</button>`
      ).join('');
      el.querySelectorAll('.cat-tab').forEach(b => b.onclick = () => { state.activeCat = b.dataset.cat; renderCategories(); renderMenu(); });
    }

    function renderMenu() {
      const q = document.getElementById('searchBox').value.trim().toLowerCase();
      const items = state.menu.filter(m => {
        if (state.activeCat !== 'all' && m.category !== state.activeCat) return false;
        if (q && !(m.name || '').toLowerCase().includes(q)) return false;
        return true;
      });
      const grid = document.getElementById('menuGrid');
      grid.innerHTML = items.map(m => `
        <div class="menu-tile ${m.available === false ? 'unavailable' : ''}" data-id="${esc(m.id)}">
          <div class="cat">${esc(m.category || '')}</div>
          <div class="name">${esc(m.name)}</div>
          <div class="price">${fmt(m.price)}</div>
        </div>
      `).join('') || '<div class="cart-empty">Không tìm thấy món.</div>';
      grid.querySelectorAll('.menu-tile').forEach(t => t.onclick = () => addToCart(t.dataset.id));
    }

    function addToCart(id) {
      const item = state.menu.find(m => String(m.id) === String(id));
      if (!item) return;
      const row = state.cart.find(c => c.id === item.id);
      if (row) row.qty++;
      else state.cart.push({ id: item.id, name: item.name, price: item.price, qty: 1 });
      renderCart();
    }

    function changeQty(id, delta) {
      const row = state.cart.find(c => String(c.id) === String(id));
      if (!row) return;
      row.qty += delta;
      if (row.qty <= 0) state.cart = state.cart.filter(c => c.id !== row.id);
      renderCart();
    }

    function renderCart() {
      const el = document.getElementById('cartItems');
      if (!state.cart.length) {
        el.innerHTML = '<div class="cart-empty">Chưa có món. Click vào menu để thêm.</div>';
      } else {
        el.innerHTML = state.cart.map(c => `
          <div class="cart-row">
            <div class="info">
              <div class="nm">${esc(c.name)}</div>
              <div class="pr">${fmt(c.price)} × ${c.qty}</div>
            </div>
            <div class="qty-ctrl">
              <button class="qty-btn" data-act="dec" data-id="${esc(c.id)}">−</button>
              <div class="qty-num">${c.qty}</div>
              <button class="qty-btn" data-act="inc" data-id="${esc(c.id)}">+</button>
            </div>
          </div>
        `).join('');
        el.querySelectorAll('.qty-btn').forEach(b => b.onclick = () => changeQty(b.dataset.id, b.dataset.act === 'inc' ? 1 : -1));
      }
      const subtotal = state.cart.reduce((s, c) => s + c.price * c.qty, 0);
      const discount = 0;
      const vat = Math.round((subtotal - discount) * 0.08);
      const total = subtotal - discount + vat;
      document.getElementById('sumSubtotal').textContent = fmt(subtotal);
      document.getElementById('sumDiscount').textContent = fmt(discount);
      document.getElementById('sumVat').textContent = fmt(vat);
      document.getElementById('sumTotal').textContent = fmt(total);
      document.getElementById('btnCheckout').disabled = !state.cart.length;
    }

    async function checkout() {
      if (!state.cart.length) return;
      const btn = document.getElementById('btnCheckout');
      btn.disabled = true; btn.textContent = 'Đang xử lý...';
      try {
        const subtotal = state.cart.reduce((s, c) => s + c.price * c.qty, 0);
        const vat = Math.round(subtotal * 0.08);
        const total = subtotal + vat;
        const orderData = {
          items: state.cart,
          total,
          customer_name: state.table ? `Bàn ${state.table}` : `Walk-in`,
          customer_phone: state.memberPhone || '0000000000',
          phone: state.memberPhone || null,
          payment_method: state.payment,
          notes: state.table ? `Bàn: ${state.table} | Staff: ${state.staff?.name}` : `Mang về | Staff: ${state.staff?.name}`,
          source: 'pos',
        };
        const r = await fetch(`${API_BASE}/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${auth()}` },
          body: JSON.stringify(orderData),
        });
        const d = await r.json();
        if (!d.success) throw new Error(d.error || 'Failed');

        // FIX: backend trả nested { success, order: { id, ... } } — đọc d.order.id thay vì d.order_id
        const orderId = d.order?.id;
        if (!orderId) throw new Error('Backend không trả order.id — kiểm tra worker response');

        if (state.payment === 'payos') {
          const pr = await fetch(`${API_BASE}/payment/create-link`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ order_id: orderId, amount: total, description: `POS #${orderId}`, customer_name: orderData.customer_name }),
          });
          const pd = await pr.json();
          if (pd.success && pd.checkoutUrl) { window.open(pd.checkoutUrl, '_blank'); }
        }

        // Confirm order immediately (POS = paid on spot if cash)
        if (state.payment === 'cash') {
          await fetch(`${API_BASE}/orders/${orderId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${auth()}` },
            body: JSON.stringify({ status: 'confirmed', payment_status: 'paid' }),
          });
        }

        document.getElementById('successOrderId').textContent = orderId;
        document.getElementById('successMsg').textContent = state.payment === 'payos'
          ? 'Chờ khách quét QR. Đơn đã gửi đến bếp.'
          : 'Thanh toán tiền mặt. Đơn đã gửi đến bếp.';
        document.getElementById('successModal').classList.add('show');
        window._lastOrder = { ...orderData, order_id: orderId, subtotal, vat };
      } catch (e) {
        alert('Lỗi: ' + e.message);
      } finally {
        btn.disabled = false; btn.textContent = '⚡ Thanh Toán';
      }
    }

    function printReceipt() {
      const o = window._lastOrder; if (!o) return;
      const win = window.open('', '_blank', 'width=320,height=600');
      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Bill ${o.order_id}</title>
        <style>body{font-family:'Courier New',monospace;font-size:11px;padding:10px;width:280px}
        h2{text-align:center;margin:0;font-size:14px}.row{display:flex;justify-content:space-between;padding:2px 0}
        hr{border:0;border-top:1px dashed #000;margin:6px 0}.total{font-weight:700;font-size:13px}</style></head>
        <body><h2>AURA CAFE</h2><div style="text-align:center;font-size:10px">Sa Đéc, Đồng Tháp</div><hr>
        <div class="row"><span>Đơn:</span><span>${esc(o.order_id)}</span></div>
        <div class="row"><span>NV:</span><span>${esc(state.staff?.name || '')}</span></div>
        <div class="row"><span>Giờ:</span><span>${new Date().toLocaleString('vi-VN')}</span></div>
        <div class="row"><span>KH:</span><span>${esc(o.customer_name)}</span></div><hr>
        ${o.items.map(i => `<div class="row"><span>${esc(i.name)} x${i.qty}</span><span>${fmt(i.price*i.qty)}</span></div>`).join('')}
        <hr><div class="row"><span>Tạm tính</span><span>${fmt(o.subtotal)}</span></div>
        <div class="row"><span>VAT 8%</span><span>${fmt(o.vat)}</span></div>
        <div class="row total"><span>TỔNG</span><span>${fmt(o.total)}</span></div>
        <hr><div style="text-align:center;font-size:10px">Cảm ơn quý khách!</div>
        <script>window.print();setTimeout(()=>window.close(),500);<\/script><button id="themeToggle" onclick="window._theme.toggle()" aria-label="Toggle dark mode" style="position:fixed;bottom:16px;right:16px;z-index:9999;width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;" title="Chuyển đổi giao diện">🌓</button>
<scr" + "ipt>
(function(){var t=localStorage.getItem('theme')||'light';function a(){document.documentElement.setAttribute('data-theme',t);var e=document.getElementById('themeToggle');if(e)e.textContent=t==='dark'?'🌞':'🌙'}a();window._theme={toggle:function(){t=t==='light'?'dark':'light';localStorage.setItem('theme',t);a()}}})();
</scr" + "ipt>
</body></html>`;
      win.document.write(html); win.document.close();
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadStaff(); loadMenu();
      document.getElementById('searchBox').addEventListener('input', renderMenu);
      document.getElementById('tableSelect').addEventListener('change', (e) => {
        state.table = e.target.value;
        document.getElementById('tableNo').textContent = e.target.value || 'MV';
      });
      document.querySelectorAll('.pay-btn').forEach(b => b.onclick = () => {
        document.querySelectorAll('.pay-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); state.payment = b.dataset.pay;
      });
      document.getElementById('btnCheckout').onclick = checkout;
      document.getElementById('btnWalletLookup').onclick = handleWalletLookup;
      document.getElementById('btnWalletClear').onclick = clearWallet;
      document.getElementById('walletPhone').addEventListener('keydown', e => { if (e.key === 'Enter') handleWalletLookup(); });
      document.getElementById('btnPrint').onclick = () => {
        window._lastOrder = { items: state.cart, subtotal: state.cart.reduce((s,c)=>s+c.price*c.qty,0), vat: 0, total: state.cart.reduce((s,c)=>s+c.price*c.qty,0), order_id: 'TEMP', customer_name: state.table ? `Bàn ${state.table}` : 'Walk-in' };
        printReceipt();
      };
      document.getElementById('printReceipt').onclick = printReceipt;
      document.getElementById('newOrder').onclick = () => {
        state.cart = []; renderCart();
        document.getElementById('successModal').classList.remove('show');
      };
      document.getElementById('btnLogout').onclick = async () => {
        await fetch(`${API_BASE}/auth/logout`, { method: 'POST', headers: { Authorization: `Bearer ${auth()}` }});
        localStorage.removeItem('aura_auth_token');
        window.location.href = '/admin/login.html';
      };
    });
  </script>

<!-- ══ MOBILE SIDEBAR ══ -->
<script>
(function(){
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sbOverlay');
  if (!sidebar || !overlay) return;
  function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('open'); }
  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }
  overlay.addEventListener('click', closeSidebar);
  document.querySelectorAll('.sb-item').forEach(item => {
    item.addEventListener('click', () => { if (window.innerWidth <= 768) closeSidebar(); });
  });
document.getElementById('hamburger')?.addEventListener('click', openSidebar);

})();
</script>
</div>
</div>
</div>
</body>
