<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Đơn hàng | AURA CAFE Admin</title>
    <meta name="description" content="Quản lý đơn hàng AURA CAFE - Xem, cập nhật trạng thái, xử lý đơn hàng online và tại quán.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/public/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" media="print" onload="this.media='all'">
    <style>
        :root {
            --primary:  #6750A4;
            --success:  #4CAF50;
            --warning:  #FF9800;
            --danger:   #f44336;
            --bg:       #f5f5f5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); }
        h1,h2,h3 { font-family: 'Space Grotesk', Georgia, serif; }

        .page-header {
            background: #fff;
            padding: 16px 24px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .page-header h1 { font-size: 1.4rem; color: #333; display:flex; align-items:center; gap:10px; }
        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: #666; text-decoration: none;
            padding: 8px 16px; border-radius: 8px; transition: background .2s;
        }
        .back-link:hover { background: #f5f5f5; }

        .realtime-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #ccc;
            display: inline-block;
            transition: background .3s;
        }
        .realtime-dot.live {
            background: var(--success);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%,100% { box-shadow: 0 0 0 0 rgba(76,175,80,.5); }
            50%      { box-shadow: 0 0 0 6px rgba(76,175,80,0); }
        }
        .realtime-label { font-size: .75rem; color: #666; }

        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        .filter-section {
            background: #fff;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            padding: 8px 18px;
            border: 1px solid #e0e0e0;
            background: #fff;
            border-radius: 20px;
            cursor: pointer;
            font-size: .875rem;
            transition: all .2s;
        }
        .filter-btn:hover { background: #f5f5f5; }
        .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .orders-table { background: #fff; border-radius: 12px; overflow: hidden; }
        .orders-table table { width: 100%; border-collapse: collapse; }
        .orders-table th {
            text-align: left; padding: 14px 16px;
            background: #f9f9f9; color: #666;
            font-weight: 500; font-size: .82rem;
            border-bottom: 2px solid #e0e0e0;
        }
        .orders-table td { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; font-size: .9rem; }
        .orders-table tr:hover { background: #fafafa; }

        .status-badge {
            display: inline-flex; padding: 5px 11px;
            border-radius: 20px; font-size: .82rem; font-weight: 500;
        }
        .s-bep    { background: #FFF3E0; color: #E65100; }
        .s-pha    { background: #E8EAF6; color: #283593; }
        .s-san    { background: #FFF8E1; color: #FF6F00; }
        .s-hoan   { background: #E8F5E9; color: #1B5E20; }
        .s-huy    { background: #FFEBEE; color: #B71C1C; }
        .s-other  { background: #F5F5F5; color: #555; }

        .action-btn {
            padding: 6px 14px; border: none; border-radius: 8px;
            cursor: pointer; font-size: .82rem; margin-right: 4px;
            transition: opacity .2s;
        }
        .action-btn:hover { opacity: .8; }
        .btn-next   { background: var(--primary); color: #fff; }
        .btn-cancel { background: var(--danger);  color: #fff; }
        .btn-view   { background: #f0f0f0; color: #333; }

        .loading, .empty-state { text-align: center; padding: 50px 20px; color: #999; }
        .spinner {
            display: inline-block; width: 36px; height: 36px;
            border: 4px solid rgba(0,0,0,.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .kds-toast {
            position: fixed; bottom: 24px; right: 24px;
            background: #333; color: #fff;
            padding: 14px 20px; border-radius: 10px;
            font-size: .9rem; z-index: 9999;
            transform: translateY(80px); opacity: 0;
            transition: all .3s ease;
            max-width: 320px;
            box-shadow: 0 4px 20px rgba(0,0,0,.25);
        }
        .kds-toast.show { transform: translateY(0); opacity: 1; }
        .kds-toast.new-order { border-left: 4px solid var(--success); }

        @keyframes flash-row {
            0%,100% { background: transparent; }
            50%      { background: rgba(76,175,80,.15); }
        }
        .new-row { animation: flash-row 1s ease 2; }

        @keyframes kdsFlash {
          0% { box-shadow: inset 0 0 0 0 rgba(212,175,55,0); }
          50% { box-shadow: inset 0 0 80px 20px rgba(212,175,55,0.4); }
          100% { box-shadow: inset 0 0 0 0 rgba(212,175,55,0); }
        }
    </style>
</head>
<body>

<header class="page-header">
    <h1>
        📋 Quản lý Đơn hàng
        <span class="realtime-dot" id="realtimeDot" title="KDS realtime polling"></span>
    </h1>
    <div style="display:flex;align-items:center;gap:16px;">
        <span class="realtime-label" id="realtimeLabel">Đang kết nối...</span>
        <a href="/admin/dashboard.html" class="back-link">
            <span class="material-symbols-outlined" style="font-size:18px;">dashboard</span>
            Dashboard
        </a>
    </div>
</header>

<div class="container">
    <div class="filter-section">
        <span style="font-weight:500;color:#666;">Lọc:</span>
        <button class="filter-btn active" data-status="all">Tất cả</button>
        <button class="filter-btn" data-status="pending">Bếp tiếp nhận</button>
        <button class="filter-btn" data-status="preparing">Đang pha chế</button>
        <button class="filter-btn" data-status="ready">Sẵn sàng</button>
        <button class="filter-btn" data-status="completed">Hoàn thành</button>
        <button class="filter-btn" data-status="cancelled">Đã hủy</button>
    </div>

    <div class="orders-table">
        <table>
            <thead>
                <tr>
                    <th>Mã đơn</th>
                    <th>Khách hàng</th>
                    <th>Bàn</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái</th>
                    <th>Thời gian</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="ordersBody">
                <tr><td colspan="7" class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top:12px;">Đang tải đơn hàng...</p>
                </td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="kds-toast" id="kdsToast"></div>

<script type="module">
import { startKdsPolling } from '../js/kds-poll.js';

const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const API      = IS_LOCAL ? 'http://127.0.0.1:8787/api/kds/orders' : 'https://aura-space-worker.sadec-marketing-hub.workers.dev/api/kds/orders';

// Status keys MUST match backend enum: pending, preparing, ready, completed, cancelled
// Legacy Vietnamese keys kept for backward-compat với đơn cũ trong DB
const STATUS_LABEL = {
  pending:    'Bếp tiếp nhận',
  preparing:  'Đang pha chế',
  ready:      'Sẵn sàng',
  completed:  'Hoàn thành',
  cancelled:  'Đã hủy',
  // Legacy fallback
  'Bep tiep nhan': 'Bếp tiếp nhận',
  'Dang pha che':  'Đang pha chế',
  'San sang':      'Sẵn sàng',
  'Hoan thanh':    'Hoàn thành',
  'Da huy':        'Đã hủy',
};

const STATUS_CLASS = {
  pending:    's-bep',
  preparing:  's-pha',
  ready:      's-san',
  completed:  's-hoan',
  cancelled:  's-huy',
  // Legacy
  'Bep tiep nhan': 's-bep',
  'Dang pha che':  's-pha',
  'San sang':      's-san',
  'Hoan thanh':    's-hoan',
  'Da huy':        's-huy',
};

// NEXT_STATUS dùng English keys + values khớp backend enum
const NEXT_STATUS = {
  pending:    'preparing',
  preparing:  'ready',
  ready:      'completed',
  // Legacy: map từ status cũ → English next
  'Bep tiep nhan': 'preparing',
  'Dang pha che':  'ready',
  'San sang':      'completed',
};

function fmtCurrency(n) {
  return new Intl.NumberFormat('vi-VN').format(n ?? 0) + '₫';
}
function fmtDate(s) {
  if (!s) return '—';
  // D1 CURRENT_TIMESTAMP returns 'YYYY-MM-DD HH:MM:SS' (UTC, no Z) — JS parses as local → wrong.
  // Normalize: add 'Z' suffix for ambiguous SQL format so JS treats as UTC.
  let iso = s;
  if (typeof s === 'string' && /^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/.test(s)) {
    iso = s.replace(' ', 'T') + 'Z';
  }
  return new Date(iso).toLocaleString('vi-VN', {
    timeZone: 'Asia/Ho_Chi_Minh',
    hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit'
  });
}

function showToast(msg, cls = '') {
  const el = document.getElementById('kdsToast');
  el.textContent = msg;
  el.className = 'kds-toast show ' + cls;
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.className = 'kds-toast'; }, 3500);
}

let currentFilter = 'all';
let knownOrderIds = new Set();

function renderRow(order, isNew = false) {
  const next = NEXT_STATUS[order.status];
  const label = STATUS_LABEL[order.status] ?? order.status;
  const cls   = STATUS_CLASS[order.status] ?? 's-other';
  const table = order.table_number ? `${order.table_number} (${order.zone})` : '—';

  return `
    <tr data-order-id="${order.id}" class="${isNew ? 'new-row' : ''}">
      <td><strong>#${order.id.slice(-6)}</strong></td>
      <td>${order.customer_name ?? 'Khách lẻ'}<br>
          <small style="color:#999">${order.phone ?? ''}</small></td>
      <td>${table}</td>
      <td><strong>${fmtCurrency(order.total_amount)}</strong></td>
      <td><span class="status-badge ${cls}">${label}</span></td>
      <td style="font-size:.82rem;color:#888">${fmtDate(order.created_at)}</td>
      <td>
        <button class="action-btn btn-view"
          onclick="viewOrder('${order.id}')">👁 Xem</button>
        ${next ? `<button class="action-btn btn-next"
          onclick="advanceOrder('${order.id}','${next}')">▶ Tiếp theo</button>` : ''}
        ${order.status !== 'cancelled' && order.status !== 'completed'
          ? `<button class="action-btn btn-cancel"
              onclick="cancelOrder('${order.id}')">✕ Hủy</button>` : ''}
      </td>
    </tr>`;
}

async function loadOrders(flash = false) {
  const tbody = document.getElementById('ordersBody');
  try {
    const qs = currentFilter !== 'all' ? `?status=${encodeURIComponent(currentFilter)}&limit=100` : '?limit=100';
    const res = await fetch(API + qs);
    const { success, data } = await res.json();

    if (!success || !data?.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty-state">Không có đơn hàng nào</td></tr>`;
      return;
    }

    const newIds = flash ? data.filter(o => !knownOrderIds.has(o.id)).map(o => o.id) : [];
    data.forEach(o => knownOrderIds.add(o.id));

    tbody.innerHTML = data.map(o => renderRow(o, newIds.includes(o.id))).join('');

    if (newIds.length) {
      showToast(`🔔 ${newIds.length} đơn mới!`, 'new-order');
      if (Notification.permission === 'granted') {
        new Notification('AURA CAFE KDS', {
          body: `${newIds.length} đơn hàng mới cần xử lý`,
          icon: '/public/images/favicon.svg',
        });
      }
    }
  } catch (err) {
    console.error('[KDS] Load orders failed:', err);
    tbody.innerHTML = `<tr><td colspan="7" style="color:red;text-align:center;padding:40px;">
      Lỗi: ${err.message}</td></tr>`;
  }
}

window.viewOrder = async function(id) {
  try {
    const res = await fetch(`${API}/${id}`);
    const { data } = await res.json();
    const items = (data.items ?? []).map(i => `• ${i.product_name} ×${i.quantity}`).join('\n');
    alert(`Đơn #${id.slice(-6)}\nBàn: ${data.table_number ?? '—'}\nKhách: ${data.customer_name}\n\nSản phẩm:\n${items}\n\nTổng: ${fmtCurrency(data.total_amount)}`);
  } catch (e) { alert('Lỗi: ' + e.message); }
};

window.advanceOrder = async function(id, newStatus) {
  if (!confirm(`Chuyển đơn #${id.slice(-6)} → "${STATUS_LABEL[newStatus]}"?`)) return;
  try {
    const res = await fetch(`${API}/${id}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus }),
    });
    const json = await res.json();
    if (json.success) { loadOrders(); showToast(`✅ Đã cập nhật → ${STATUS_LABEL[newStatus]}`); }
    else showToast('❌ Lỗi: ' + (json.error ?? 'unknown'));
  } catch (e) { showToast('❌ ' + e.message); }
};

window.cancelOrder = async function(id) {
  if (!confirm(`Hủy đơn #${id.slice(-6)}?`)) return;
  try {
    const res = await fetch(`${API}/${id}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'Da huy' }),
    });
    const json = await res.json();
    if (json.success) { loadOrders(); showToast('🗑 Đơn đã hủy'); }
    else showToast('❌ ' + (json.error ?? 'unknown'));
  } catch (e) { showToast('❌ ' + e.message); }
};

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.status;
    loadOrders();
  });
});

const dot   = document.getElementById('realtimeDot');
const label = document.getElementById('realtimeLabel');

// Web Audio API — generate beep without external file
let audioCtx = null;
function playBeep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.4);
    // Double beep
    setTimeout(() => {
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2); gain2.connect(audioCtx.destination);
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(880, audioCtx.currentTime);
      gain2.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc2.start(audioCtx.currentTime);
      osc2.stop(audioCtx.currentTime + 0.4);
    }, 500);
  } catch (e) { console.warn('[KDS] Beep failed:', e); }
}

function notifyNewOrder() {
  if ('Notification' in window && Notification.permission === 'granted') {
    const n = new Notification('🛎 AURA CAFE — Đơn mới', {
      body: 'Có đơn hàng mới, mở KDS để xử lý',
      icon: '/assets/brand/favicon.svg',
      tag: 'new-order',
      requireInteraction: false
    });
    setTimeout(() => n.close(), 8000);
  }
}

const poller = startKdsPolling(
  (ts) => {
    label.textContent = `Cập nhật lúc ${new Date(ts).toLocaleTimeString('vi-VN')}`;
    loadOrders(true);
    playBeep();
    notifyNewOrder();
    // Visual flash
    document.body.style.animation = 'kdsFlash 0.6s ease-out';
    setTimeout(() => { document.body.style.animation = ''; }, 700);
  },
  { pollMs: 3000 }
);

poller.onStatusChange = (state) => {
  if (state === 'started') {
    dot.classList.add('live');
    label.textContent = 'Đang theo dõi realtime (3s)';
  } else {
    dot.classList.remove('live');
    label.textContent = 'Dừng';
  }
};

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

loadOrders();
</script>

</body>
</html>
