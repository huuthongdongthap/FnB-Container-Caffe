<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Đặt Bàn | AURA CAFE Admin</title>
    <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#1A1A2E">
    <link rel="stylesheet" href="../admin/shared.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
/* ══ Reservations — Mobile-First Page Styles ══ */

/* Page header */
.page-header {
  padding: clamp(10px, 2vw, 16px) clamp(12px, 3vw, 24px);
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 50;
}
.page-header h1 {
  font-family: var(--fd);
  font-size: clamp(1rem, 4vw, 1.4rem);
  color: var(--white);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: clamp(0.65rem, 2vw, 0.75rem);
  color: var(--chrome-steel);
}

/* Container */
.container {
  padding: clamp(12px, 3vw, 24px);
  max-width: 100%;
}

/* Filter bar — mobile-first */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: clamp(12px, 3vw, 20px);
  flex-wrap: wrap;
  align-items: flex-end;
}
.filter-bar > div {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.filter-bar label {
  font-size: clamp(0.6rem, 2vw, 0.7rem);
  color: var(--txt);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.filter-input {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--white);
  padding: clamp(10px, 2vw, 12px) clamp(10px, 2.5vw, 14px);
  border-radius: 8px;
  font-size: clamp(0.75rem, 2.5vw, 0.85rem);
  font-family: var(--fb);
  min-height: 44px;
  -webkit-appearance: none;
  appearance: none;
}
.filter-input:focus {
  outline: none;
  border-color: var(--chrome-silver);
  box-shadow: 0 0 0 2px rgba(201,214,223,.15);
}
.filter-input[type="date"] {
  min-width: 140px;
}
.btn-filter {
  padding: clamp(10px, 2vw, 12px) clamp(14px, 2.5vw, 20px);
  border-radius: 8px;
  font-size: clamp(0.75rem, 2.5vw, 0.85rem);
  font-weight: 600;
  background: rgba(201,214,223,.1);
  color: var(--chrome-silver);
  border: 1px solid var(--border);
  transition: all .2s;
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
  font-family: var(--fb);
  white-space: nowrap;
}
.btn-filter:hover { background: rgba(201,214,223,.2); }
.btn-filter:active { transform: scale(0.96); }

/* Table card */
.table-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.rsv-table {
  width: 100%;
  border-collapse: collapse;
  font-size: clamp(0.75rem, 2.5vw, 0.85rem);
}
.rsv-table th {
  text-align: left;
  padding: clamp(10px, 2vw, 14px) clamp(8px, 2vw, 16px);
  font-size: clamp(0.6rem, 2vw, 0.7rem);
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--txt);
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  white-space: nowrap;
}
.rsv-table td {
  padding: clamp(10px, 2vw, 14px) clamp(8px, 2vw, 16px);
  border-bottom: 1px solid var(--border-light);
  vertical-align: middle;
}
.rsv-table tr:hover td {
  background: rgba(255,255,255,.02);
}
.rsv-table .code {
  font-family: var(--fm);
  color: var(--white);
  font-weight: 500;
  font-size: clamp(0.7rem, 2.5vw, 0.8rem);
}

/* Status badges — dark theme */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: clamp(0.65rem, 2vw, 0.72rem);
  font-weight: 600;
  white-space: nowrap;
  min-height: 28px;
  box-sizing: border-box;
}
.badge-confirmed { color: var(--success); background: rgba(45,90,61,.15); }
.badge-cancelled { color: var(--danger-muted); background: rgba(75,85,99,.12); }
.badge-pending { color: var(--chrome-steel); background: rgba(107,159,184,.12); }

/* Buttons */
.btn-cancel {
  padding: 8px 14px;
  border-radius: 8px;
  font-size: clamp(0.7rem, 2.5vw, 0.8rem);
  font-weight: 600;
  background: rgba(75,85,99,.2);
  color: var(--danger-muted);
  transition: all .2s;
  min-height: 36px;
  -webkit-tap-highlight-color: transparent;
  border: none;
  cursor: pointer;
  font-family: var(--fb);
}
.btn-cancel:hover { background: rgba(75,85,99,.35); }
.btn-cancel:active { transform: scale(0.95); }

/* Toast */
.toast {
  position: fixed;
  bottom: calc(16px + var(--safe-bottom));
  left: 16px;
  right: 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--white);
  padding: 14px 20px;
  border-radius: 10px;
  font-size: clamp(0.8rem, 2.5vw, 0.9rem);
  z-index: 9999;
  transform: translateY(80px);
  opacity: 0;
  transition: all .3s ease;
  max-width: none;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.toast.show { transform: translateY(0); opacity: 1; }

/* Loading / Empty */
.empty, .loading {
  text-align: center;
  padding: clamp(30px, 8vw, 50px) 20px;
  color: var(--txt);
}
.spinner {
  display: inline-block;
  width: clamp(28px, 8vw, 36px);
  height: clamp(28px, 8vw, 36px);
  border: 3px solid var(--border);
  border-top-color: var(--chrome-silver);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ MOBILE TABLE CARD FALLBACK ══ */
/* When viewport is narrow, transform each row into a card */

.rsv-table-wrap {
  position: relative;
}

/* Hide thead on mobile */
@media (max-width: 768px) {
  .rsv-table thead { display: none; }

  .rsv-table,
  .rsv-table tbody,
  .rsv-table tr,
  .rsv-table td {
    display: block;
    width: 100%;
  }

  .rsv-table tr {
    padding: clamp(12px, 3vw, 16px);
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .rsv-table tr:last-child {
    border-bottom: none;
  }

  .rsv-table td {
    padding: 6px 0;
    border-bottom: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    min-height: 32px;
  }

  .rsv-table td::before {
    content: attr(data-label);
    font-weight: 600;
    font-size: clamp(0.6rem, 2vw, 0.68rem);
    color: var(--chrome-steel);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    min-width: 80px;
  }

  .rsv-table td:last-child {
    justify-content: flex-end;
    margin-top: 8px;
  }

  /* Hide columns on very small screens */
  .rsv-table td:nth-child(6),
  .rsv-table td:nth-child(7),
  .rsv-table td:nth-child(8) {
    display: none;
  }
  .rsv-table td:nth-child(6),
  .rsv-table td:nth-child(7),
  .rsv-table td:nth-child(8)::before {
    display: none;
  }
}

@media (max-width: 420px) {
  .filter-bar {
    flex-direction: column;
    align-items: stretch;
  }
  .filter-bar > div {
    width: 100%;
  }
  .btn-filter {
    width: 100%;
    text-align: center;
  }
}

@media (min-width: 769px) {
  .container { max-width: 1400px; padding: 24px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<div class="sb-overlay" id="sbOverlay"></div>

<aside class="sidebar" id="sidebar">
    <div class="sb-logo">
        <div class="sb-logo-text"><img src="/images/logo-256.png" alt="" style="height:28px;vertical-align:middle;margin-right:6px;" loading="lazy">AURA CAFE</div>
        <div class="sb-logo-sub">Admin Panel</div>
    </div>
    <nav class="sb-nav">
        <a href="dashboard.html" class="sb-item"><span class="icon">📊</span> Dashboard</a>
        <a href="orders.html" class="sb-item"><span class="icon">📋</span> Đơn Hàng</a>
        <a href="reservations.html" class="sb-item active"><span class="icon">🪑</span> Đặt Bàn</a>
        <a href="pos.html" class="sb-item"><span class="icon">💳</span> POS</a>
        <a href="staff.html" class="sb-item"><span class="icon">👥</span> Nhân Viên</a>
    </nav>
</aside>

<div class="main">
    <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
            <button class="hamburger" id="hamburger">☰</button>
            <div class="topbar-title">🪑 Quản lý Đặt Bàn</div>
        </div>
        <div class="topbar-right">
            <span id="topDate" style="color:var(--txt);font-size:12px"></span>
        </div>
    </div>

    <div class="content">
        <div class="filter-bar">
            <div>
                <label>Ngày</label><br>
                <input type="date" class="filter-input" id="filterDate" inputmode="numeric" autocomplete="off">
            </div>
            <button class="btn-filter" id="btnFilter">🔍 Lọc</button>
            <button class="btn-filter" id="btnToday" style="background:rgba(45,90,61,.12);color:var(--success)">📅 Hôm nay</button>
            <button class="btn-filter" id="btnAll" style="background:rgba(0,188,212,.12);color:var(--cyan)">📋 Tất cả</button>
        </div>

        <div class="table-card">
            <table class="rsv-table">
                <thead>
                    <tr>
                        <th>Mã ĐB</th>
                        <th>Khách hàng</th>
                        <th>SĐT</th>
                        <th>Bàn</th>
                        <th>Khu vực</th>
                        <th>Ngày</th>
                        <th>Giờ</th>
                        <th>Số khách</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="rsvBody">
                    <tr class="skeleton-row"><td colspan="10"><div class="skeleton-line"></div><div class="skeleton-line short"></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

// ── AUTH GUARD ──
if (!localStorage.getItem('aura_auth_token')) {
    window.location.replace('/admin/login.html');
    return;
}

const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const API = IS_LOCAL
  ? 'http://127.0.0.1:8787/api/reservations'
  : 'https://aura-space-worker.sadec-marketing-hub.workers.dev/api/reservations';

// Auth helper — admin pages dùng JWT trong localStorage
const token = () => localStorage.getItem('aura_auth_token');
const authHeaders = () => ({ Authorization: `Bearer ${token() || ''}` });

// Date display
const d = new Date();
const days = ['Chủ Nhật','Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7'];
document.getElementById('topDate').textContent = days[d.getDay()] + ', ' + String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();

// Set default date to today
const today = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
document.getElementById('filterDate').value = today;

// Mobile sidebar
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sbOverlay');
document.getElementById('hamburger').addEventListener('click', function(){ sidebar.classList.add('open'); overlay.classList.add('open'); });
overlay.addEventListener('click', function(){ sidebar.classList.remove('open'); overlay.classList.remove('open'); });

// Toast
function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(function(){ el.classList.remove('show'); }, 3000);
}

// Render
function renderRow(r) {
    const statusCls = r.status === 'confirmed' ? 'badge-confirmed' : r.status === 'cancelled' ? 'badge-cancelled' : 'badge-pending';
    const statusLabel = r.status === 'confirmed' ? '✓ Đã xác nhận' : r.status === 'cancelled' ? '✕ Đã hủy' : '⏳ Chờ';
    const canCancel = r.status === 'confirmed';
    return '<tr>' +
        '<td class="code" data-label="Mã ĐB">' + r.id.slice(-8) + '</td>' +
        '<td data-label="Khách hàng" style="color:var(--white);font-weight:500">' + (r.customer_name || '—') + '</td>' +
        '<td data-label="SĐT">' + (r.customer_phone || '—') + '</td>' +
        '<td data-label="Bàn" style="color:var(--chrome-silver);font-weight:600">' + (r.table_number || '—') + '</td>' +
        '<td data-label="Khu vực">' + (r.table_zone || r.zone || '—') + '</td>' +
        '<td data-label="Ngày">' + (r.date || '—') + '</td>' +
        '<td data-label="Giờ">' + (r.time || '—') + '</td>' +
        '<td data-label="Số khách" style="text-align:center">' + (r.guest_count || 2) + '</td>' +
        '<td data-label="Trạng thái"><span class="badge ' + statusCls + '">' + statusLabel + '</span></td>' +
            '<button class="btn-cancel" data-id="' + r.id + '">✕ Hủy</button>'
        '</tr>';
}

async function loadReservations(dateFilter) {
    const tbody = document.getElementById('rsvBody');
    try {
        let url = API + '?limit=100';
        if (dateFilter) url += '&date=' + dateFilter;
        const res = await fetch(url, { headers: authHeaders() });
        if (res.status === 401) {
          tbody.innerHTML = '<tr><td colspan="10" class="empty">Vui lòng <a href="login.html">đăng nhập</a> để xem đặt bàn</td></tr>';
          return;
        }
        if (!res.ok) {
          const text = await res.text().catch(() => '');
          throw new Error(`HTTP ${res.status}: ${text.slice(0, 100)}`);
        }
        const json = await res.json();

        if (!json.success || !json.data || json.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" class="empty">Không có đặt bàn nào</td></tr>';
            return;
        }
        tbody.innerHTML = json.data.map(renderRow).join('');
    } catch (err) {
        tbody.innerHTML = '<tr><td colspan="10" class="empty" style="color:var(--danger-muted)">Lỗi: ' + err.message + '</td></tr>';
    }
}

// Cancel
window.cancelRsv = async function(id) {
    if (!confirm('Hủy đặt bàn #' + id.slice(-8) + '?')) return;
    try {
        const res = await fetch(API + '/' + id, { method: 'DELETE', headers: authHeaders() });
        if (!res.ok) {
          const text = await res.text().catch(() => '');
          throw new Error(`HTTP ${res.status}: ${text.slice(0, 100)}`);
        }
        const json = await res.json();
        if (json.success) {
            showToast('🗑 Đã hủy đặt bàn');
            loadReservations(document.getElementById('filterDate').value);
        } else {
            showToast('❌ Lỗi: ' + (json.error || 'unknown'));
        }
    } catch(e) { showToast('❌ ' + e.message); }
};

// Filter buttons
document.getElementById('btnFilter').addEventListener('click', function(){
    loadReservations(document.getElementById('filterDate').value);
});
document.getElementById('btnToday').addEventListener('click', function(){
    document.getElementById('filterDate').value = today;
    loadReservations(today);
});
document.getElementById('btnAll').addEventListener('click', function(){
    document.getElementById('filterDate').value = '';
    loadReservations(null);
});

// Initial load — today
loadReservations(today);

  // Delegated cancel clicks
  document.getElementById("rsvBody").addEventListener("click", function(e) {
    const btn = e.target.closest(".btn-cancel[data-id]");
    if (!btn) return;
    cancelRsv(btn.dataset.id);
  });

// ── AUTO-REFRESH: poll every 20s for real-time sync ──
var _refreshInterval = setInterval(function(){
    var val = document.getElementById('filterDate').value;
    var currentDate = val !== '' ? val : today;
    loadReservations(val !== '' ? val : null);
}, 20000);

})();
</script>
<button id="themeToggle" onclick="window._theme.toggle()" aria-label="Toggle dark mode" style="position:fixed;bottom:16px;right:16px;z-index:9999;width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;" title="Chuyển đổi giao diện">🌓</button>
<script>
(function(){var t=localStorage.getItem('theme')||'light';function a(){document.documentElement.setAttribute('data-theme',t);var e=document.getElementById('themeToggle');if(e)e.textContent=t==='dark'?'🌞':'🌙'}a();window._theme={toggle:function(){t=t==='light'?'dark':'light';localStorage.setItem('theme',t);a()}}})();
</script>
</body>
</html>
