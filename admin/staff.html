<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1A1A2E">
  <meta name="robots" content="noindex, nofollow">
  <title>Quản lý nhân viên · AURA CAFE</title>
      <link rel="stylesheet" href="../admin/shared.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
/* ══ Staff — Mobile-First Page Styles ══ */

/* Page header */
.page-header {
  padding: clamp(10px, 2vw, 16px) clamp(12px, 3vw, 24px);
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 50;
}
.page-header h1 {
  font-family: var(--fd);
  font-size: clamp(1rem, 4vw, 1.4rem);
  color: var(--white);
}

/* Container */
.container {
  padding: clamp(12px, 3vw, 24px);
  max-width: 100%;
}
.subtitle {
  color: var(--txt);
  font-size: clamp(0.7rem, 2.5vw, 0.82rem);
  margin-bottom: clamp(12px, 3vw, 20px);
  font-family: var(--fb);
}

/* Panels — mobile-first: stacked */
.panels {
  display: grid;
  grid-template-columns: 1fr;
  gap: clamp(12px, 3vw, 20px);
}

/* Panel card */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: clamp(14px, 3vw, 20px);
}
.panel h3 {
  font-family: var(--fd);
  color: var(--chrome-silver);
  font-size: clamp(0.85rem, 3vw, 1rem);
  margin-bottom: clamp(10px, 2vw, 14px);
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* Alert */
.alert {
  padding: 12px 16px;
  border-radius: 8px;
  font-size: clamp(0.75rem, 2.5vw, 0.82rem);
  margin-bottom: 12px;
  display: none;
}
.alert.show { display: block; }
.alert.ok {
  background: rgba(45,90,61,.15);
  color: var(--success);
  border: 1px solid rgba(45,90,61,.3);
}
.alert.err {
  background: rgba(75,85,99,.12);
  color: var(--danger-muted);
  border: 1px solid rgba(75,85,99,.3);
}

/* Form fields */
.field { margin-bottom: clamp(10px, 2vw, 14px); }
.field label {
  display: block;
  font-size: clamp(0.6rem, 2vw, 0.68rem);
  color: var(--txt);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 600;
  font-family: var(--fb);
}
.field input,
.field select {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--white);
  padding: clamp(10px, 2vw, 12px) clamp(10px, 2.5vw, 14px);
  border-radius: 8px;
  font-size: clamp(0.8rem, 2.5vw, 0.9rem);
  font-family: var(--fb);
  min-height: 44px;
  -webkit-appearance: none;
  appearance: none;
}
.field input:focus,
.field select:focus {
  outline: none;
  border-color: var(--chrome-silver);
  box-shadow: 0 0 0 2px rgba(201,214,223,.15);
}
.field input::placeholder { color: var(--txt); }

/* Primary button */
.btn-primary {
  width: 100%;
  background: var(--chrome-silver);
  color: var(--bg);
  border: none;
  padding: clamp(12px, 2vw, 14px);
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: clamp(0.72rem, 2.5vw, 0.8rem);
  margin-top: 8px;
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
  font-family: var(--fb);
  transition: filter .2s, transform .1s;
}
.btn-primary:hover { filter: brightness(1.1); }
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled {
  opacity: .4;
  cursor: not-allowed;
  filter: grayscale(.5);
}

/* Table */
.table-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.rsv-table, .staff-table {
  width: 100%;
  border-collapse: collapse;
  font-size: clamp(0.75rem, 2.5vw, 0.85rem);
}
.rsv-table th, .staff-table th {
  text-align: left;
  padding: clamp(10px, 2vw, 12px) clamp(8px, 2vw, 16px);
  font-size: clamp(0.6rem, 2vw, 0.68rem);
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--txt);
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  white-space: nowrap;
}
.rsv-table td, .staff-table td {
  padding: clamp(10px, 2vw, 14px) clamp(8px, 2vw, 16px);
  border-bottom: 1px solid var(--border-light);
  vertical-align: middle;
}
.rsv-table tr:hover td, .staff-table tr:hover td {
  background: rgba(255,255,255,.02);
}

/* Role badges */
.role-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: clamp(0.6rem, 2vw, 0.68rem);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  min-height: 28px;
  display: inline-flex;
  align-items: center;
}
.role-owner { background: rgba(107,159,184,.15); color: var(--chrome-steel); }
.role-staff { background: rgba(45,90,61,.15); color: var(--success); }

/* Status */
.status-active { color: var(--success); font-weight: 600; }
.status-inactive { color: var(--txt); }

/* ══ Responsive ══ */
@media (max-width: 420px) {
  .page-header { flex-direction: column; align-items: flex-start; }
  .topbar-right { width: 100%; justify-content: flex-end; }
}

/* Tablet+: side-by-side panels */
@media (min-width: 769px) {
  .panels { grid-template-columns: 400px 1fr; gap: 20px; }
  .container { max-width: 1400px; padding: 24px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ══ Mobile Table Card Fallback ══ */
@media (max-width: 768px) {
  .staff-table thead { display: none; }
  .staff-table, .staff-table tbody, .staff-table tr, .staff-table td {
    display: block; width: 100%;
  }
  .staff-table tr {
    padding: clamp(12px, 3vw, 16px);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .staff-table tr:last-child { border-bottom: none; }
  .staff-table td {
    padding: 6px 0;
    border-bottom: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    min-height: 32px;
  }
  .staff-table td::before {
    content: attr(data-label);
    font-weight: 600;
    font-size: clamp(0.6rem, 2vw, 0.68rem);
    color: var(--chrome-steel);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    min-width: 80px;
  }
  .staff-table td:last-child { justify-content: flex-end; margin-top: 8px; }
}
</style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<div class="sidebar" id="sidebar" style="display:none">
  <div class="sb-logo">
    <div class="sb-logo-text">AURA</div>
    <div class="sb-logo-sub">CAFE Admin</div>
  </div>
  <nav class="sb-nav">
    <a href="../admin/dashboard.html" class="sb-item"><span class="icon">📊</span>Dashboard</a>
    <a href="../admin/orders.html" class="sb-item"><span class="icon">📦</span>Đơn hàng</a>
    <a href="reservations.html" class="sb-item"><span class="icon">📅</span>Đặt bàn</a>
    <a href="menu.html" class="sb-item"><span class="icon">☕</span>Thực đơn</a>
    <a href="staff.html" class="sb-item active"><span class="icon">👥</span>Nhân viên</a>
    <a href="pos.html" class="sb-item"><span class="icon">🖥️</span>POS</a>
    <a href="checkin-approve.html" class="sb-item"><span class="icon">✅</span>Check-in</a>
    <a href="../index.html" class="sb-item"><span class="icon">🏠</span>Về trang chủ</a>
  </nav>
  <div class="sb-user">
    <div class="sb-avatar">A</div>
    <div><div class="sb-user-name">Admin</div><div class="sb-user-role">Owner</div></div>
  </div>
</div>
<div class="sb-overlay" id="sbOverlay"></div>
  <header>
    <button class="hamburger" id="hamburger" style="background:none;border:none;color:var(--chrome-silver);font-size:clamp(1.2rem,4vw,1.6rem);cursor:pointer;padding:4px 8px;-webkit-tap-highlight-color:transparent;display:flex">☰</button><div class="brand"><b>AURA</b>&nbsp;Admin</div>
      <a href="/admin/dashboard.html">Dashboard</a>
      <a href="/admin/orders.html">Orders</a>
      <a href="/admin/pos.html">POS</a>
      <a href="/kds.html">KDS</a>
      <a href="/admin/staff.html" style="color:var(--chrome-light)">Nhân viên</a>
      </header>

  <div class="main">
<div class="content">
<main>
    <h1>Quản lý nhân viên</h1>
    <div class="subtitle">Chỉ Owner có quyền tạo/sửa tài khoản staff</div>

    <div id="alert" class="alert"></div>

    <div class="panels">
      <section class="panel">
        <h3>Thêm nhân viên mới</h3>
        <form id="staffForm">
          <div class="field"><label>Họ tên</label><input type="text" name="name" inputmode="text" autocomplete="name" required></div>
          <div class="field"><label>Email</label><input type="email" name="email" inputmode="email" autocomplete="email" required></div>
          <div class="field"><label>Số điện thoại</label><input type="tel" name="phone" inputmode="tel" autocomplete="tel"></div>
          <div class="field"><label>Mật khẩu (min 8)</label><input type="password" name="password" inputmode="current-password" autocomplete="new-password" required minlength="8" maxlength="128"></div>
          <div class="field"><label>Vai trò</label>
            <select name="role" inputmode="list">
              <option value="staff">Nhân viên (staff)</option>
              <option value="owner">Quản lý (owner)</option>
            </select>
          </div>
          <button type="submit" class="btn-primary" id="btnSubmit">+ Tạo tài khoản</button>
        </form>
      </section>

      <section class="panel">
        <h3>Danh sách nhân viên</h3>
        <table>
          <thead>
            <tr>
              <th>Tên</th><th>Email</th><th>Vai trò</th><th>Tạo lúc</th><th>Trạng thái</th>
            </tr>
          </thead>
          <tbody id="staffTbody">
            <tr><td colspan="5" class="empty"><div class="skeleton-line"></div><div class="skeleton-line short"></div></td></tr>
          </tbody>
        </table>
      </section>
    </div>
  </main>

  <script type="module">
    const _IS_LOCAL = ['localhost', '127.0.0.1'].includes(window.location.hostname);
    const API_BASE = _IS_LOCAL
      ? 'http://127.0.0.1:8787/api'
      : 'https://aura-space-worker.sadec-marketing-hub.workers.dev/api';

    const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    const token = () => localStorage.getItem('aura_auth_token');

    function alertMsg(msg, type = 'ok') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `alert show ${type}`;
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    async function ensureOwner() {
      const t = token(); if (!t) { window.location.href = '/admin/login.html'; return false; }
      try {
        const r = await fetch(`${API_BASE}/auth/me`, { headers: { Authorization: `Bearer ${t}` }});
        const d = await r.json();
        if (!d.success || d.user?.role !== 'owner') {
          alertMsg('Chỉ Owner mới có quyền truy cập', 'err');
          setTimeout(() => window.location.href = '/admin/dashboard.html', 1500);
          return false;
        }
        return true;
      } catch (_e) { window.location.href = '/admin/login.html'; return false; }
    }

    async function loadStaff() {
      try {
        // FIX: backend lưu staff/owner trong KV (key user:<email>) — endpoint mới /api/auth/staff scan KV
        const r = await fetch(`${API_BASE}/auth/staff`, { headers: { Authorization: `Bearer ${token()}` }});
        const d = await r.json();
        if (!d.success) throw new Error(d.error || 'Failed to load');
        const list = d.users || [];
        const tbody = document.getElementById('staffTbody');
        if (!list.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:30px">Chưa có nhân viên</td></tr>';
          return;
        }
        tbody.innerHTML = list.map(u => `
          <tr>
            <td data-label="Tên"><b>${esc(u.name || '—')}</b></td>
            <td data-label="Email">${esc(u.email)}</td>
            <td data-label="Vai trò"><span class="role-badge role-${esc(u.role)}">${esc(u.role)}</span></td>
            <td data-label="Tạo lúc" style="font-family:var(--fm);font-size:11px;color:var(--muted)">${esc((u.created_at || '').slice(0, 16))}</td>
            <td data-label="Trạng thái" class="${u.active === false ? 'status-inactive' : 'status-active'}">${u.active === false ? '● Tắt' : '● Hoạt động'}</td>
          </tr>
        `).join('');
      } catch (e) {
        document.getElementById('staffTbody').innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--danger-muted);padding:30px">Lỗi tải: ${esc(e.message)}</td></tr>`;
      }
    }

    document.getElementById('staffForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnSubmit');
      btn.disabled = true; btn.textContent = 'Đang tạo...';
      const fd = new FormData(e.target);
      const body = Object.fromEntries(fd.entries());
      try {
        const r = await fetch(`${API_BASE}/auth/register-staff`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token()}` },
          body: JSON.stringify(body),
        });
        const d = await r.json();
        if (!d.success) throw new Error(d.error || 'Failed');
        alertMsg(`Tạo nhân viên ${body.email} thành công`, 'ok');
        e.target.reset();
        loadStaff();
      } catch (err) {
        alertMsg('Lỗi: ' + err.message, 'err');
      } finally {
        btn.disabled = false; btn.textContent = '+ Tạo tài khoản';
      }
    });

    (async () => { if (await ensureOwner()) loadStaff(); })();
  </script>

<!-- ══ MOBILE SIDEBAR ══ -->
<script>
(function(){
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sbOverlay');
  if (!sidebar || !overlay) return;
  function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('open'); }
  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }
  overlay.addEventListener('click', closeSidebar);
  document.querySelectorAll('.sb-item').forEach(item => {
    item.addEventListener('click', () => { if (window.innerWidth <= 768) closeSidebar(); });
  });
document.getElementById('hamburger')?.addEventListener('click', openSidebar);

})();
</script>
</div>
</div>
</div>
