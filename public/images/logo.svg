<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="AURA CAFE Favicon">
  <title>AURA CAFE — Favicon (Navy × Silver)</title>

  <defs>
    <linearGradient id="favSilver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#D2D2D2"/>
      <stop offset="100%" stop-color="#A0A0A0"/>
    </linearGradient>
    <filter id="favDeboss">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.2"/>
    </filter>
  </defs>

  <!-- Navy circle -->
  <circle cx="16" cy="16" r="15" fill="#0A0F1F"/>
  <circle cx="16" cy="16" r="15" fill="none" stroke="#C0C0C0" stroke-opacity="0.15" stroke-width="0.6"/>

  <!-- A Monogram — simplified for favicon -->
  <path d="
    M 10,8
    L 12,8
    L 16,8
    L 20,8
    L 22,8
    L 21,24
    L 19,24
    L 17,14
    L 16,17
    L 15,14
    L 13,24
    L 11,24
    Z
  " fill="url(#favSilver)" filter="url(#favDeboss)"/>

  <!-- Crossbar -->
  <line x1="12" y1="15" x2="20" y2="15" stroke="#D2D2D2" stroke-width="1.2" filter="url(#favDeboss)"/>

  <!-- Apex glow dot -->
  <circle cx="16" cy="9" r="0.8" fill="#D2D2D2" opacity="0.6"/>
</svg>
