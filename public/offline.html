<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - AURA CAFE Café</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1A1A2E 0%, #111111 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 24px;
    }

    .offline-container {
      text-align: center;
      max-width: 400px;
    }

    .offline-icon {
      font-size: 64px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #E8EEF3;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      color: #C9D6DF;
      margin-bottom: 32px;
    }

    .retry-btn {
      display: inline-block;
      background: #C9D6DF;
      color: #0A1A2E;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 500;
      font-size: 16px;
      transition: all 0.2s;
      border: 1px solid #3A6B80;
      cursor: pointer;
    }

    .retry-btn:hover {
      background: #3A6B80;
      color: #FFFFFF;
      transform: translateY(-2px);
    }

    .offline-tips {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .offline-tips h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6B9FB8;
      margin-bottom: 12px;
    }

    .offline-tips ul {
      list-style: none;
      text-align: left;
    }

    .offline-tips li {
      padding: 8px 0;
      color: #C9D6DF;
      font-size: 14px;
    }

    .offline-tips li::before {
      content: "✓";
      color: #6B9FB8;
      margin-right: 8px;
      font-weight: bold;
    }
  </style>
<meta name="description" content="Bạn đang ngoại tuyến — AURA CAFE"><meta name="robots" content="noindex"><meta name="theme-color" content="#1A1A2E"></head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>Bạn đang offline</h1>
    <p>Không có kết nối internet. Một số tính năng có thể không khả dụng.</p>

    <button class="retry-btn" onclick="window.location.reload()">
      🔄 Thử lại
    </button>

    <div class="offline-tips">
      <h2>Chế độ offline</h2>
      <ul>
        <li>Xem menu đã lưu trong cache</li>
        <li>Xem thông tin quán</li>
        <li>Đơn hàng sẽ được đồng bộ khi có mạng</li>
      </ul>
    </div>
  </div>

  <script>
    // Auto retry when back online
    window.addEventListener('online', () => {
      setTimeout(() => window.location.reload(), 1000);
    });

    // Check connection status
    if (navigator.onLine) {
      window.location.reload();
    }
  </script>
<button id="themeToggle" onclick="window._theme.toggle()" aria-label="Toggle dark mode" style="position:fixed;bottom:16px;right:16px;z-index:9999;width:44px;height:44px;border-radius:50%;border:1px solid #ccc;background:#fff;color:#333;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;" title="Chuyển đổi giao diện">🌓</button><script>(function(){var t=localStorage.getItem('theme')||'light';function a(){document.documentElement.setAttribute('data-theme',t);var e=document.getElementById('themeToggle');if(e)e.textContent=t==='dark'?'🌞':'🌙'}a();window._theme={toggle:function(){t=t==='light'?'dark':'light';localStorage.setItem('theme',t);a()}}})();</script></body>
</html>
