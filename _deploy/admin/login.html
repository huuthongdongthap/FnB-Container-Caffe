<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập — AURA SPACE Admin</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0A0A0A">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon-B1hE6VMY.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0A0A0A;
            --surface: rgba(255,255,255,0.04);
            --surface-hover: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.08);
            --gold: #C9A200;
            --gold-e: #FFD700;
            --amber: #FFB300;
            --gold-dim: rgba(201,162,0,0.15);
            --text: #F5F5F5;
            --text-dim: rgba(245,245,245,0.5);
            --red: #FF5252;
            --green: #4CAF50;
            --font-display: 'Cinzel', 'Marcellus', 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Inter', -apple-system, sans-serif;
        }
        html, body { height: 100%; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(201,162,0,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(255,179,0,0.04) 0%, transparent 40%);
            animation: ambientDrift 20s ease-in-out infinite alternate;
            z-index: 0;
        }
        @keyframes ambientDrift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-3%, 2%) rotate(3deg); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-brand .logo-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }
        .login-brand h1 {
            font-family: var(--font-display);
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--gold);
        }
        .login-brand p {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .login-card {
            background: var(--surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4),
                        inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .login-card h2 {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
            color: var(--text);
        }

        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 6px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: var(--text);
            font-size: 15px;
            font-family: var(--font-body);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input::placeholder { color: var(--text-dim); }
        .form-group input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-dim);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--gold-e), var(--gold));
            color: #0A0A0A;
            font-size: 14px;
            font-weight: 700;
            font-family: var(--font-body);
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .btn-login:hover { opacity: 0.92; }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .login-error {
            font-size: 13px;
            color: var(--red);
            text-align: center;
            margin-top: 14px;
            min-height: 20px;
            transition: opacity 0.2s;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-dim);
        }
        .login-footer a { color: var(--gold); text-decoration: none; }

        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(10,10,10,0.3);
            border-top-color: #0A0A0A;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .login-card { padding: 28px 20px; border-radius: 16px; }
            .login-brand h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-brand">
            <span class="logo-icon">☕</span>
            <h1>AURA SPACE</h1>
            <p>ADMIN · STAFF PORTAL</p>
        </div>

        <div class="login-card">
            <h2>Đăng Nhập</h2>
            <form id="loginForm" autocomplete="on">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="admin@auraspace.vn" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Mật Khẩu</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="btnLogin">Đăng Nhập</button>
                <div class="login-error" id="loginError"></div>
            </form>
        </div>

        <div class="login-footer">
            <a href="/index.html">← Về Trang Chủ</a>
        </div>
    </div>

    <script>
    (function() {
        // Legacy migration: admin_token → aura_auth_token
        const _legacy = localStorage.getItem('admin_token');
        if (_legacy && !localStorage.getItem('aura_auth_token')) {
            localStorage.setItem('aura_auth_token', _legacy);
            const _legacyUser = localStorage.getItem('admin_user');
            if (_legacyUser) localStorage.setItem('aura_auth_user', _legacyUser);
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_user');
        }

        // If already logged in with admin token, go to dashboard
        const existingToken = localStorage.getItem('aura_auth_token');
        if (existingToken) {
            window.location.replace('/admin/dashboard.html');
            return;
        }

        const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        const API_BASE = IS_LOCAL
            ? 'http://127.0.0.1:8787'
            : 'https://aura-space-worker.sadec-marketing-hub.workers.dev';

        const form = document.getElementById('loginForm');
        const btn = document.getElementById('btnLogin');
        const errorEl = document.getElementById('loginError');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            errorEl.textContent = '';
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Đang xác thực...';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(API_BASE + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();

                if (!res.ok || !data.success) {
                    throw new Error(data.error || 'Đăng nhập thất bại');
                }

                const role = data.user?.role || 'customer';
                if (role !== 'owner' && role !== 'staff') {
                    throw new Error('Tài khoản không có quyền truy cập Admin');
                }

                localStorage.setItem('aura_auth_token', data.token);
                localStorage.setItem('aura_auth_user', JSON.stringify(data.user));

                btn.innerHTML = '✓ Thành công!';
                btn.style.background = 'var(--green)';
                btn.style.color = '#fff';

                setTimeout(function() {
                    window.location.replace('/admin/dashboard.html');
                }, 600);

            } catch (err) {
                errorEl.textContent = err.message;
                btn.disabled = false;
                btn.innerHTML = 'Đăng Nhập';
            }
        });
    })();
    </script>
</body>
</html>
