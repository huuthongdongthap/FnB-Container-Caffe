<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Đơn hàng | AURA SPACE Admin</title>
    <meta name="description" content="Quản lý đơn hàng AURA SPACE - Xem, cập nhật trạng thái, xử lý đơn hàng online và tại quán.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon-B1hE6VMY.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" media="print" onload="this.media='all'">
    <style>
        :root {
            --primary:  #6750A4;
            --success:  #4CAF50;
            --warning:  #FF9800;
            --danger:   #f44336;
            --bg:       #f5f5f5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); }
        h1,h2,h3 { font-family: 'Space Grotesk', Georgia, serif; }

        .page-header {
            background: #fff;
            padding: 16px 24px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .page-header h1 { font-size: 1.4rem; color: #333; display:flex; align-items:center; gap:10px; }
        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: #666; text-decoration: none;
            padding: 8px 16px; border-radius: 8px; transition: background .2s;
        }
        .back-link:hover { background: #f5f5f5; }

        .realtime-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #ccc;
            display: inline-block;
            transition: background .3s;
        }
        .realtime-dot.live {
            background: var(--success);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%,100% { box-shadow: 0 0 0 0 rgba(76,175,80,.5); }
            50%      { box-shadow: 0 0 0 6px rgba(76,175,80,0); }
        }
        .realtime-label { font-size: .75rem; color: #666; }

        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        .filter-section {
            background: #fff;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            padding: 8px 18px;
            border: 1px solid #e0e0e0;
            background: #fff;
            border-radius: 20px;
            cursor: pointer;
            font-size: .875rem;
            transition: all .2s;
        }
        .filter-btn:hover { background: #f5f5f5; }
        .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .orders-table { background: #fff; border-radius: 12px; overflow: hidden; }
        .orders-table table { width: 100%; border-collapse: collapse; }
        .orders-table th {
            text-align: left; padding: 14px 16px;
            background: #f9f9f9; color: #666;
            font-weight: 500; font-size: .82rem;
            border-bottom: 2px solid #e0e0e0;
        }
        .orders-table td { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; font-size: .9rem; }
        .orders-table tr:hover { background: #fafafa; }

        .status-badge {
            display: inline-flex; padding: 5px 11px;
            border-radius: 20px; font-size: .82rem; font-weight: 500;
        }
        .s-bep    { background: #FFF3E0; color: #E65100; }
        .s-pha    { background: #E8EAF6; color: #283593; }
        .s-san    { background: #FFF8E1; color: #FF6F00; }
        .s-hoan   { background: #E8F5E9; color: #1B5E20; }
        .s-huy    { background: #FFEBEE; color: #B71C1C; }
        .s-other  { background: #F5F5F5; color: #555; }

        .action-btn {
            padding: 6px 14px; border: none; border-radius: 8px;
            cursor: pointer; font-size: .82rem; margin-right: 4px;
            transition: opacity .2s;
        }
        .action-btn:hover { opacity: .8; }
        .btn-next   { background: var(--primary); color: #fff; }
        .btn-cancel { background: var(--danger);  color: #fff; }
        .btn-view   { background: #f0f0f0; color: #333; }

        .loading, .empty-state { text-align: center; padding: 50px 20px; color: #999; }
        .spinner {
            display: inline-block; width: 36px; height: 36px;
            border: 4px solid rgba(0,0,0,.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .kds-toast {
            position: fixed; bottom: 24px; right: 24px;
            background: #333; color: #fff;
            padding: 14px 20px; border-radius: 10px;
            font-size: .9rem; z-index: 9999;
            transform: translateY(80px); opacity: 0;
            transition: all .3s ease;
            max-width: 320px;
            box-shadow: 0 4px 20px rgba(0,0,0,.25);
        }
        .kds-toast.show { transform: translateY(0); opacity: 1; }
        .kds-toast.new-order { border-left: 4px solid var(--success); }

        @keyframes flash-row {
            0%,100% { background: transparent; }
            50%      { background: rgba(76,175,80,.15); }
        }
        .new-row { animation: flash-row 1s ease 2; }

        @keyframes kdsFlash {
          0% { box-shadow: inset 0 0 0 0 rgba(201,169,98,0); }
          50% { box-shadow: inset 0 0 80px 20px rgba(201,169,98,0.4); }
          100% { box-shadow: inset 0 0 0 0 rgba(201,169,98,0); }
        }
    </style>
  <script type="module" crossorigin src="/assets/admin/orders-Cs8Bo6Ox.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-CgKPaEuY.js">
  <link rel="modulepreload" crossorigin href="/assets/config-DMcokd3f.js">
  <link rel="modulepreload" crossorigin href="/assets/kds-poll-B5HS_Qes.js">
</head>
<body>

<header class="page-header">
    <h1>
        📋 Quản lý Đơn hàng
        <span class="realtime-dot" id="realtimeDot" title="KDS realtime polling"></span>
    </h1>
    <div style="display:flex;align-items:center;gap:16px;">
        <span class="realtime-label" id="realtimeLabel">Đang kết nối...</span>
        <a href="/admin/dashboard.html" class="back-link">
            <span class="material-symbols-outlined" style="font-size:18px;">dashboard</span>
            Dashboard
        </a>
    </div>
</header>

<div class="container">
    <div class="filter-section">
        <span style="font-weight:500;color:#666;">Lọc:</span>
        <button class="filter-btn active" data-status="all">Tất cả</button>
        <button class="filter-btn" data-status="pending">Bếp tiếp nhận</button>
        <button class="filter-btn" data-status="preparing">Đang pha chế</button>
        <button class="filter-btn" data-status="ready">Sẵn sàng</button>
        <button class="filter-btn" data-status="completed">Hoàn thành</button>
        <button class="filter-btn" data-status="cancelled">Đã hủy</button>
    </div>

    <div class="orders-table">
        <table>
            <thead>
                <tr>
                    <th>Mã đơn</th>
                    <th>Khách hàng</th>
                    <th>Bàn</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái</th>
                    <th>Thời gian</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="ordersBody">
                <tr><td colspan="7" class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top:12px;">Đang tải đơn hàng...</p>
                </td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="kds-toast" id="kdsToast"></div>


</body>
</html>
