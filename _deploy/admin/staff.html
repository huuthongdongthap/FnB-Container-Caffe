<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Quản lý nhân viên · AURA SPACE</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0A0A0A;--card:#1A1A1A;--gold:#C9A200;--eg:#FFD700;--amber:#FFB300;--text:#F5F5F5;--muted:#8A8A8A;--danger:#EF4444;--success:#22C55E}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
    header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:#141414;border-bottom:1px solid rgba(201,162,0,.3)}
    .brand{font-family:'Cinzel', 'Marcellus', 'Cormorant Garamond', Georgia, serif;font-size:18px;color:var(--eg)}
    .brand b{color:var(--gold);letter-spacing:2px}
    .nav-links{display:flex;gap:16px;font-size:13px}
    .nav-links a{color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:6px;transition:.2s}
    .nav-links a:hover{background:var(--card);color:var(--gold)}
    main{padding:24px;max-width:1200px;margin:0 auto}
    h1{font-family:'Cinzel', 'Marcellus', 'Cormorant Garamond', Georgia, serif;color:var(--eg);font-size:28px;margin-bottom:4px}
    .subtitle{color:var(--muted);font-size:13px;margin-bottom:24px}
    .panels{display:grid;grid-template-columns:400px 1fr;gap:20px}
    .panel{background:var(--card);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:20px}
    .panel h3{font-family:'Cinzel', 'Marcellus', 'Cormorant Garamond', Georgia, serif;color:var(--gold);font-size:16px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(201,162,0,.15)}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
    .field input,.field select{width:100%;background:#0F0F0F;border:1px solid rgba(255,255,255,.08);color:var(--text);padding:10px 12px;border-radius:6px;font-size:13px;font-family:'Inter',sans-serif}
    .field input:focus,.field select:focus{outline:0;border-color:var(--gold)}
    .btn-primary{width:100%;background:linear-gradient(135deg,var(--gold) 0%,var(--amber) 100%);color:#000;border:0;padding:12px;border-radius:8px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;font-size:12px;margin-top:6px}
    .btn-primary:hover{filter:brightness(1.1)}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.08);font-weight:600}
    td{padding:12px 8px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
    tr:hover{background:rgba(201,162,0,.03)}
    .role-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .role-owner{background:rgba(255,179,0,.15);color:var(--amber)}
    .role-staff{background:rgba(34,197,94,.15);color:var(--success)}
    .status-active{color:var(--success)}
    .status-inactive{color:var(--muted)}
    .alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none}
    .alert.show{display:block}
    .alert.ok{background:rgba(34,197,94,.1);color:var(--success);border:1px solid rgba(34,197,94,.3)}
    .alert.err{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
    @media(max-width:880px){.panels{grid-template-columns:1fr}}
  </style>
  <script type="module" crossorigin src="/assets/admin/staff-C9i3uxy-.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-CgKPaEuY.js">
</head>
<body>
  <header>
    <div class="brand"><b>AURA</b>&nbsp;Admin</div>
    <nav class="nav-links">
      <a href="/admin/dashboard.html">Dashboard</a>
      <a href="/admin/orders.html">Orders</a>
      <a href="/admin/pos.html">POS</a>
      <a href="/kds.html">KDS</a>
      <a href="/admin/staff.html" style="color:var(--eg)">Nhân viên</a>
    </nav>
  </header>

  <main>
    <h1>Quản lý nhân viên</h1>
    <div class="subtitle">Chỉ Owner có quyền tạo/sửa tài khoản staff</div>

    <div id="alert" class="alert"></div>

    <div class="panels">
      <section class="panel">
        <h3>Thêm nhân viên mới</h3>
        <form id="staffForm">
          <div class="field"><label>Họ tên</label><input type="text" name="name" required></div>
          <div class="field"><label>Email</label><input type="email" name="email" required></div>
          <div class="field"><label>Số điện thoại</label><input type="tel" name="phone"></div>
          <div class="field"><label>Mật khẩu (min 8)</label><input type="password" name="password" required minlength="8" maxlength="128"></div>
          <div class="field"><label>Vai trò</label>
            <select name="role">
              <option value="staff">Nhân viên (staff)</option>
              <option value="owner">Quản lý (owner)</option>
            </select>
          </div>
          <button type="submit" class="btn-primary" id="btnSubmit">+ Tạo tài khoản</button>
        </form>
      </section>

      <section class="panel">
        <h3>Danh sách nhân viên</h3>
        <table>
          <thead>
            <tr>
              <th>Tên</th><th>Email</th><th>Vai trò</th><th>Tạo lúc</th><th>Trạng thái</th>
            </tr>
          </thead>
          <tbody id="staffTbody">
            <tr><td colspan="5" style="text-align:center;color:var(--muted);padding:30px">Đang tải...</td></tr>
          </tbody>
        </table>
      </section>
    </div>
  </main>

</body>
</html>
