<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" role="img" aria-label="AURA SPACE — Rooftop Café Sa Đéc">
  <title>AURA SPACE — Brand Wordmark (Noir Lounge)</title>
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#B8860B"/>
      <stop offset="45%" stop-color="#FFD700"/>
      <stop offset="55%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#C9A200"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C9A200" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#C9A200" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C9A200" stop-opacity="0"/>
    </linearGradient>
    <filter id="debossBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- Top hairline rule -->
  <line x1="40" y1="34" x2="560" y2="34" stroke="url(#goldSoft)" stroke-width="0.8"/>

  <!-- Wordmark AURA SPACE (Playfair Display, serif, generous tracking) -->
  <text x="300" y="92"
        text-anchor="middle"
        font-family="Playfair Display, Georgia, serif"
        font-size="54"
        font-weight="400"
        fill="url(#goldGrad)"
        letter-spacing="16"
        filter="url(#debossBlur)">AURA SPACE</text>

  <!-- Subtitle -->
  <text x="300" y="118"
        text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
        font-size="10"
        font-weight="600"
        fill="#9E9E9E"
        letter-spacing="6">ROOFTOP CAFÉ &#xB7; SA ĐÉC</text>

  <!-- Bottom hairline rule -->
  <line x1="40" y1="128" x2="560" y2="128" stroke="url(#goldSoft)" stroke-width="0.8"/>
</svg>
