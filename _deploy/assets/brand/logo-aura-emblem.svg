<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" role="img" aria-label="AURA SPACE Emblem">
  <title>AURA SPACE — Container Rooftop Emblem (V2F)</title>
  <defs>
    <linearGradient id="emblemGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#C9A200"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <radialGradient id="emblemAura" cx="50%" cy="60%" r="55%">
      <stop offset="0%"   stop-color="#C9A200" stop-opacity="0.20"/>
      <stop offset="70%"  stop-color="#C9A200" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#C9A200" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Noir Lounge aura glow -->
  <circle cx="50" cy="62" r="54" fill="url(#emblemAura)"/>

  <!-- Outer pyramid — the rooftop apex -->
  <polygon points="50,10 90,100 10,100"
           fill="none"
           stroke="url(#emblemGold)"
           stroke-width="2"
           stroke-linejoin="round"/>

  <!-- Container deck line (the Rooftop surface) -->
  <line x1="28" y1="73" x2="72" y2="73"
        stroke="url(#emblemGold)"
        stroke-width="1.6"/>

  <!-- Ground level line (Tầng trệt) -->
  <line x1="36" y1="56" x2="64" y2="56"
        stroke="url(#emblemGold)"
        stroke-width="1"
        opacity="0.65"/>

  <!-- Water droplet (水 Thủy essence — Noir Lounge DNA) -->
  <path d="M50,88 Q42,81 50,72 Q58,81 50,88 Z"
        fill="url(#emblemGold)"
        opacity="0.92"/>

  <!-- Corner frame detail (industrial container rivet markers) -->
  <circle cx="14" cy="99" r="1.1" fill="#C9A200" opacity="0.7"/>
  <circle cx="86" cy="99" r="1.1" fill="#C9A200" opacity="0.7"/>
  <circle cx="50" cy="13" r="1.1" fill="#FFD700"/>
</svg>
