name = "aura-space-worker"
main = "src/index.js"
compatibility_date = "2025-01-01"

# D1 Database Binding
[[d1_databases]]
binding = "AURA_DB"
database_name = "fnb-caffe-db"
database_id = "13260741-7795-431f-b491-7c8a17510bda"

# KV Namespace for Auth
[[kv_namespaces]]
binding = "AUTH_KV"
id = "5628adf57f1548b5af615de4e9021893"

# Non-sensitive environment variables
[vars]
ENVIRONMENT = "production"
# Restrict CORS to known origins (comma-separated). Wildcard removed for security.
CORS_ORIGIN = "https://fnb-caffe-container.pages.dev,https://auraspace.cafe"
# JWT token lifetime (seconds). Default 604800 = 7 days.
JWT_EXPIRY_SECONDS = "604800"
# SLA threshold (minutes). Orders stuck in kitchen past this get flagged.
SLA_THRESHOLD_MINUTES = "15"

# Cron trigger — SLA overdue check every 5 minutes
[triggers]
crons = ["*/5 * * * *"]

# ─── Secrets (set via CLI, NOT committed) ───
# Run these commands to configure secrets:
#   wrangler secret put JWT_SECRET
#   wrangler secret put PAYOS_CLIENT_ID
#   wrangler secret put PAYOS_API_KEY
#   wrangler secret put PAYOS_CHECKSUM_KEY
