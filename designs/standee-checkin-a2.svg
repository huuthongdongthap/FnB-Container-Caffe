<?xml version="1.0" encoding="UTF-8"?>
<!--
  Standee Check-in AURA — Print spec
  Size: A2 (420 × 594 mm) — viewBox 420×594
  Print: 1200 DPI offset / inkjet, vinyl backing 250gsm matte
  Cost: ~150k VND tại shop in Sa Đéc
  
  Anh Còn: print 1 cái đặt cạnh quầy thu ngân, 1 cái góc rooftop.
  Brand: AURA dark gold + chrome
-->
<svg xmlns="http://www.w3.org/2000/svg" 
     viewBox="0 0 420 594" 
     width="420mm" 
     height="594mm">
  
  <!-- Background gradient navy-dark -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="50%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A200"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="594" fill="url(#bgGrad)"/>
  
  <!-- Decorative corner brackets -->
  <g stroke="#C9A200" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 20,20 L 50,20 M 20,20 L 20,50"/>
    <path d="M 400,20 L 370,20 M 400,20 L 400,50"/>
    <path d="M 20,574 L 50,574 M 20,574 L 20,544"/>
    <path d="M 400,574 L 370,574 M 400,574 L 400,544"/>
  </g>
  
  <!-- AURA Logo + Tagline -->
  <g text-anchor="middle">
    <text x="210" y="60" 
          font-family="Playfair Display, serif" 
          font-size="42" 
          fill="url(#goldGrad)" 
          font-weight="bold"
          letter-spacing="6"
          filter="url(#glow)">AURA</text>
    
    <text x="210" y="80" 
          font-family="Inter, sans-serif" 
          font-size="10" 
          fill="#B0B0B0" 
          letter-spacing="3">CONTAINER ROOFTOP · SA ĐÉC</text>
  </g>
  
  <!-- Divider line -->
  <line x1="80" y1="100" x2="340" y2="100" stroke="#C9A200" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Camera icon -->
  <g transform="translate(210, 140)">
    <circle r="40" fill="#C9A200" opacity="0.1"/>
    <circle r="36" fill="none" stroke="#FFD700" stroke-width="1"/>
    <text text-anchor="middle" y="14" font-size="60">📸</text>
  </g>
  
  <!-- Main headline -->
  <g text-anchor="middle">
    <text x="210" y="220" 
          font-family="Playfair Display, serif" 
          font-size="28" 
          fill="#FAFAFA" 
          font-weight="bold">CHECK-IN AURA</text>
    
    <text x="210" y="248" 
          font-family="Inter, sans-serif" 
          font-size="16" 
          fill="#FFD700" 
          font-weight="600">
      🎁 Tặng đến 20.000đ vào ví
    </text>
    <text x="210" y="268" 
          font-family="Inter, sans-serif" 
          font-size="11" 
          fill="#B0B0B0">
      hoặc giảm 10% trên đơn hiện tại
    </text>
  </g>
  
  <!-- QR Code placeholder (anh thay bằng QR thật khi in) -->
  <g transform="translate(135, 290)">
    <!-- White background for QR -->
    <rect width="150" height="150" fill="#FFFFFF" rx="6"/>
    
    <!-- Mock QR pattern (placeholder — anh in QR thật của /checkin URL) -->
    <g fill="#0A0A0A">
      <!-- 3 corner markers -->
      <rect x="10" y="10" width="30" height="30" rx="2"/>
      <rect x="15" y="15" width="20" height="20" fill="#FFFFFF" rx="1"/>
      <rect x="20" y="20" width="10" height="10" rx="1"/>
      
      <rect x="110" y="10" width="30" height="30" rx="2"/>
      <rect x="115" y="15" width="20" height="20" fill="#FFFFFF" rx="1"/>
      <rect x="120" y="20" width="10" height="10" rx="1"/>
      
      <rect x="10" y="110" width="30" height="30" rx="2"/>
      <rect x="15" y="115" width="20" height="20" fill="#FFFFFF" rx="1"/>
      <rect x="20" y="120" width="10" height="10" rx="1"/>
      
      <!-- Mock data pattern -->
      <g>
        <rect x="50" y="15" width="4" height="4"/>
        <rect x="58" y="15" width="4" height="4"/>
        <rect x="70" y="15" width="4" height="4"/>
        <rect x="82" y="15" width="4" height="4"/>
        <rect x="50" y="25" width="4" height="4"/>
        <rect x="66" y="25" width="4" height="4"/>
        <rect x="74" y="25" width="4" height="4"/>
        <rect x="86" y="25" width="4" height="4"/>
        <rect x="50" y="35" width="4" height="4"/>
        <rect x="58" y="35" width="4" height="4"/>
        <rect x="78" y="35" width="4" height="4"/>
        
        <rect x="50" y="50" width="4" height="4"/>
        <rect x="62" y="50" width="4" height="4"/>
        <rect x="74" y="50" width="4" height="4"/>
        <rect x="86" y="50" width="4" height="4"/>
        <rect x="98" y="50" width="4" height="4"/>
        <rect x="50" y="62" width="4" height="4"/>
        <rect x="58" y="62" width="4" height="4"/>
        <rect x="74" y="62" width="4" height="4"/>
        <rect x="86" y="62" width="4" height="4"/>
        <rect x="98" y="62" width="4" height="4"/>
        <rect x="50" y="74" width="4" height="4"/>
        <rect x="62" y="74" width="4" height="4"/>
        <rect x="86" y="74" width="4" height="4"/>
        <rect x="98" y="74" width="4" height="4"/>
        <rect x="50" y="86" width="4" height="4"/>
        <rect x="58" y="86" width="4" height="4"/>
        <rect x="70" y="86" width="4" height="4"/>
        <rect x="82" y="86" width="4" height="4"/>
        <rect x="98" y="86" width="4" height="4"/>
        <rect x="50" y="98" width="4" height="4"/>
        <rect x="62" y="98" width="4" height="4"/>
        <rect x="78" y="98" width="4" height="4"/>
        <rect x="90" y="98" width="4" height="4"/>
        
        <rect x="50" y="110" width="4" height="4"/>
        <rect x="58" y="110" width="4" height="4"/>
        <rect x="74" y="110" width="4" height="4"/>
        <rect x="86" y="110" width="4" height="4"/>
        <rect x="98" y="110" width="4" height="4"/>
        <rect x="50" y="122" width="4" height="4"/>
        <rect x="66" y="122" width="4" height="4"/>
        <rect x="86" y="122" width="4" height="4"/>
        <rect x="98" y="122" width="4" height="4"/>
        <rect x="58" y="134" width="4" height="4"/>
        <rect x="74" y="134" width="4" height="4"/>
        <rect x="86" y="134" width="4" height="4"/>
        <rect x="98" y="134" width="4" height="4"/>
      </g>
    </g>
  </g>
  
  <!-- "Quét QR" annotation -->
  <text x="210" y="460" 
        text-anchor="middle" 
        font-family="Inter, sans-serif" 
        font-size="11" 
        fill="#FFD700">
    Quét QR bằng camera điện thoại
  </text>
  
  <!-- 3 steps -->
  <g font-family="Inter, sans-serif" font-size="11" fill="#FAFAFA">
    <g transform="translate(50, 485)">
      <circle cx="0" cy="0" r="11" fill="#C9A200"/>
      <text x="0" y="3" text-anchor="middle" font-size="12" font-weight="bold" fill="#0A0A0A">1</text>
      <text x="18" y="3" font-size="11" fill="#FAFAFA">Chụp ảnh tại quán</text>
    </g>
    
    <g transform="translate(50, 510)">
      <circle cx="0" cy="0" r="11" fill="#C9A200"/>
      <text x="0" y="3" text-anchor="middle" font-size="12" font-weight="bold" fill="#0A0A0A">2</text>
      <text x="18" y="3" font-size="11" fill="#FAFAFA">Đăng FB / Zalo có tag</text>
    </g>
    
    <g transform="translate(50, 532)">
      <text x="18" y="3" font-size="10" fill="#FFD700" font-weight="600">#AURACafeSaDec</text>
    </g>
    
    <g transform="translate(50, 555)">
      <circle cx="0" cy="0" r="11" fill="#C9A200"/>
      <text x="0" y="3" text-anchor="middle" font-size="12" font-weight="bold" fill="#0A0A0A">3</text>
      <text x="18" y="3" font-size="11" fill="#FAFAFA">Đưa nhân viên approve</text>
    </g>
  </g>
  
  <!-- Footer note -->
  <line x1="80" y1="572" x2="340" y2="572" stroke="#C9A200" stroke-width="0.5" opacity="0.3"/>
  
  <text x="210" y="584" 
        text-anchor="middle" 
        font-family="Inter, sans-serif" 
        font-size="8" 
        fill="#707070"
        letter-spacing="1">
    Áp dụng 06/06 - 30/06/2026 · Cap 1 lần/khách/tháng
  </text>
</svg>
