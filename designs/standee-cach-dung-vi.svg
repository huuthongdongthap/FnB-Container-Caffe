<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 594 841" width="594" height="841">
  <!-- A1 Standee: 594×841mm scaled to px — AURA Wallet Usage Guide -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050D1A"/>
      <stop offset="100%" stop-color="#0A1A2E"/>
    </linearGradient>
    <linearGradient id="stepGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D5A9E"/>
      <stop offset="100%" stop-color="#1B3A6B"/>
    </linearGradient>
    <linearGradient id="cobalt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D5A9E" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2D5A9E"/>
      <stop offset="100%" stop-color="#2D5A9E" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="594" height="841" fill="url(#bg)"/>

  <!-- Top decoration line -->
  <rect x="0" y="70" width="594" height="1" fill="url(#cobalt)" opacity="0.6"/>
  <rect x="0" y="770" width="594" height="1" fill="url(#cobalt)" opacity="0.6"/>

  <!-- Corner accents -->
  <rect x="30" y="30" width="40" height="3" fill="#2D5A9E" rx="1"/>
  <rect x="30" y="30" width="3" height="40" fill="#2D5A9E" rx="1"/>
  <rect x="524" y="30" width="40" height="3" fill="#2D5A9E" rx="1"/>
  <rect x="561" y="30" width="3" height="40" fill="#2D5A9E" rx="1"/>
  <rect x="30" y="808" width="40" height="3" fill="#2D5A9E" rx="1"/>
  <rect x="30" y="768" width="3" height="43" fill="#2D5A9E" rx="1"/>
  <rect x="524" y="808" width="40" height="3" fill="#2D5A9E" rx="1"/>
  <rect x="561" y="768" width="3" height="43" fill="#2D5A9E" rx="1"/>

  <!-- Brand mark -->
  <circle cx="297" cy="105" r="28" fill="none" stroke="#C9D6DF" stroke-width="1.5"/>
  <text x="297" y="113" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="600" fill="#E8EEF3">A</text>

  <!-- Brand name -->
  <text x="297" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="600" letter-spacing="14" fill="#E8EEF3">AURA</text>
  <text x="297" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" letter-spacing="5" fill="#6B9FB8">CAFE · SA ĐÉC</text>

  <!-- Main headline -->
  <text x="297" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-weight="600" fill="#C9D6DF">VÍ CASHBACK</text>
  <text x="297" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" letter-spacing="3" fill="#6B9FB8">TÍCH ĐIỂM · HOÀN TIỀN · ĐỔI QUÀ</text>

  <!-- Divider -->
  <line x1="120" y1="280" x2="474" y2="280" stroke="#2D5A9E" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Step 1 -->
  <rect x="55" y="305" width="484" height="130" rx="12" fill="rgba(45,90,158,0.12)" stroke="#2D5A9E" stroke-width="1"/>
  <circle cx="100" cy="370" r="28" fill="url(#stepGrad)"/>
  <text x="100" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#E8EEF3">1</text>
  <text x="148" y="350" font-family="Georgia, serif" font-size="20" font-weight="600" fill="#E8EEF3">Đọc SĐT khi order</text>
  <text x="148" y="374" font-family="Arial, sans-serif" font-size="13" fill="#9DB8C8">Cho nhân viên biết số điện thoại trước khi thanh toán.</text>
  <text x="148" y="395" font-family="Arial, sans-serif" font-size="13" fill="#9DB8C8">Hệ thống tự ghi nhận cashback vào ví của bạn.</text>
  <!-- Icon: phone -->
  <rect x="480" y="345" width="38" height="50" rx="5" fill="none" stroke="#2D5A9E" stroke-width="1.5"/>
  <line x1="489" y1="388" x2="509" y2="388" stroke="#2D5A9E" stroke-width="2" stroke-linecap="round"/>

  <!-- Step 2 -->
  <rect x="55" y="455" width="484" height="145" rx="12" fill="rgba(45,90,158,0.12)" stroke="#2D5A9E" stroke-width="1"/>
  <circle cx="100" cy="527" r="28" fill="url(#stepGrad)"/>
  <text x="100" y="535" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#E8EEF3">2</text>
  <text x="148" y="505" font-family="Georgia, serif" font-size="20" font-weight="600" fill="#E8EEF3">Nhận thẻ thành viên AURA</text>
  <text x="148" y="528" font-family="Arial, sans-serif" font-size="13" fill="#9DB8C8">100 thành viên đầu tiên nhận thẻ cứng đẹp + 50.000đ ví chào mừng.</text>
  <text x="148" y="549" font-family="Arial, sans-serif" font-size="13" fill="#9DB8C8">Cashback: Đồng 3% · Bạc 5% · Vàng 7% · Bạch Kim 10%</text>
  <!-- Tier badges row -->
  <rect x="148" y="560" width="52" height="20" rx="4" fill="#A5703F"/>
  <text x="174" y="574" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#fff">ĐỒNG</text>
  <rect x="208" y="560" width="44" height="20" rx="4" fill="#9CA8B5"/>
  <text x="230" y="574" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#0A1A2E">BẠC</text>
  <rect x="260" y="560" width="48" height="20" rx="4" fill="#D4AF37"/>
  <text x="284" y="574" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#050D1A">VÀNG</text>
  <rect x="316" y="560" width="80" height="20" rx="4" fill="#E8EEF3"/>
  <text x="356" y="574" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#0A1A2E">BẠCH KIM</text>

  <!-- Step 3 -->
  <rect x="55" y="620" width="484" height="130" rx="12" fill="rgba(45,90,158,0.12)" stroke="#2D5A9E" stroke-width="1"/>
  <circle cx="100" cy="685" r="28" fill="url(#stepGrad)"/>
  <text x="100" y="693" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#E8EEF3">3</text>
  <text x="148" y="663" font-family="Georgia, serif" font-size="20" font-weight="600" fill="#E8EEF3">Dùng ví trừ hóa đơn lần sau</text>
  <text x="148" y="686" font-family="Arial, sans-serif" font-size="13" fill="#9DB8C8">Ví cashback dùng trừ tối đa 50% hóa đơn · Đơn tối thiểu 30.000đ</text>
  <text x="148" y="707" font-family="Arial, sans-serif" font-size="13" fill="#9DB8C8">Quét QR bên dưới để xem ví online ngay hôm nay.</text>
  <!-- Wallet icon -->
  <rect x="478" y="658" width="44" height="34" rx="5" fill="none" stroke="#2D5A9E" stroke-width="1.5"/>
  <line x1="478" y1="668" x2="522" y2="668" stroke="#2D5A9E" stroke-width="1.5"/>
  <circle cx="512" cy="676" r="5" fill="#2D5A9E"/>

  <!-- QR section -->
  <text x="297" y="788" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" letter-spacing="2" fill="#6B9FB8">QUÉT QR ĐỂ ĐĂNG KÝ THÀNH VIÊN NGAY</text>

  <!-- Footer -->
  <text x="297" y="826" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A6A7A">AURA CAFE · Sa Đéc · 0946.013.633 · aura-cafe.vn</text>
</svg>
