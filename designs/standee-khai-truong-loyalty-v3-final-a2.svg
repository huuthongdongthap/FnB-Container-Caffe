<?xml version="1.0" encoding="UTF-8"?>
<!--
  AURA CAFE · Standee Khai Trương A2 — v3 Final
  Size: A2 (420 × 594 mm) — viewBox 420×594
  Print: 1200 DPI offset / inkjet, vinyl backing 250gsm matte
  Brand: AURA v5 Chrome/Silver palette (brand-tokens.css v5.0)
  Data source: loyalty_grand_opening_handbook.md v2.1 + loyalty_tier_definitions.md
  Program: Khai trương 06.06.2026 · Sa Đéc
  Sections: Grand Opening promo | 4-tier loyalty | Cashback x2 | Referral | Signup QR | Voucher codes
-->
<svg xmlns="http://www.w3.org/2000/svg"
