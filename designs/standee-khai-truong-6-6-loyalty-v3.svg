<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 594" width="420" height="594">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="50%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#0F1419"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A200"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#C9A200"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#252525"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
    <linearGradient id="bronzeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CD7F32"/>
      <stop offset="100%" style="stop-color:#8B4513"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#808080"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
    <linearGradient id="platinumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EEF3"/>
      <stop offset="100%" style="stop-color:#C9D6DF"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="594" fill="url(#bgGrad)"/>
  <rect width="420" height="594" fill="url(#halo)"/>

  <!-- Decorative grid -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="420" y2="100" stroke="#C9D6DF" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="420" y2="200" stroke="#C9D6DF" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="420" y2="300" stroke="#C9D6DF" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="420" y2="400" stroke="#C9D6DF" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="420" y2="500" stroke="#C9D6DF" stroke-width="0.5"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="420" height="6" fill="url(#goldGrad)"/>

  <!-- Logo -->
  <text x="210" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="url(#goldGrad)" filter="url(#glow)" letter-spacing="8">AURA</text>
  <text x="210" y="68" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C9D6DF" letter-spacing="6" opacity="0.8">CONTAINER ROOFTOP · SA ĐÉC</text>
  <line x1="160" y1="82" x2="260" y2="82" stroke="url(#goldGrad)" stroke-width="1"/>

  <!-- SECTION 1: Grand Opening -->
  <g id="grand-opening">
    <rect x="155" y="92" width="110" height="28" rx="14" fill="url(#goldGrad)"/>
    <text x="210" y="111" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#0A0A0A">06.06.2026</text>

    <text x="210" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#FFD700">KHAI TRƯƠNG</text>
    <text x="210" y="165" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#E8EEF3">Giảm 20% toàn bộ menu</text>

    <rect x="25" y="178" width="370" height="50" rx="8" fill="url(#cardBg)" stroke="#C9A200" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="200" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#FFD700">06–08/06 · Hoàn TIỀN THẬT x2</text>
    <text x="210" y="218" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#C9D6DF">Tích điểm & Cashback gấp đôi mọi hạng thành viên</text>

    <rect x="25" y="232" width="370" height="50" rx="8" fill="url(#cardBg)" stroke="#2D5A3D" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="254" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#4AFF8C">MÃ AURA20 · Giảm 20% 06/06</text>
    <text x="210" y="272" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#C9D6DF">Tối đa 50.000đ · Áp dụng tại quầy</text>
  </g>

  <!-- SECTION 2: Signup -->
  <g id="signup">
    <rect x="20" y="300" width="380" height="78" rx="10" fill="url(#cardBg)" stroke="#C9A200" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="30" y="308" width="60" height="60" rx="6" fill="#FAFAFA"/>
    <text x="60" y="340" text-anchor="middle" font-family="monospace" font-size="8" fill="#0A0A0A">QR</text>
    <text x="60" y="352" text-anchor="middle" font-family="monospace" font-size="8" fill="#0A0A0A">Đăng ký</text>

    <text x="105" y="320" font-family="sans-serif" font-size="13" font-weight="700" fill="#FFD700">ĐĂNG KÝ THÀNH VIÊN</text>
    <text x="105" y="337" font-family="sans-serif" font-size="11" fill="#C9D6DF">Quét QR · Nhập SĐT · Nhận ngay 50.000đ</text>
    <text x="105" y="354" font-family="sans-serif" font-size="11" fill="#4AFF8C">Tích điểm &amp; Hoàn tiền ngay từ ly đầu tiên</text>
    <text x="105" y="371" font-family="sans-serif" font-size="10" fill="#B0B0B0">100 khách đầu tiên · Ưu đãi giới hạn</text>
  </g>

  <!-- SECTION 3: 4 Tiers -->
  <g id="tiers">
    <text x="210" y="402" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#C9D6DF" letter-spacing="3">4 HẠNG THÀNH VIÊN</text>

    <rect x="20" y="410" width="185" height="58" rx="6" fill="url(#bronzeGrad)" opacity="0.9"/>
    <text x="112" y="428" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#FFF">ĐỒNG</text>
    <text x="112" y="442" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FFF" opacity="0.9">Hoàn 3% · Sinh nhật -5%</text>
    <text x="112" y="456" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FFF" opacity="0.7">Tích x1.0 · Hết hạn 90 ngày</text>

    <rect x="215" y="410" width="185" height="58" rx="6" fill="url(#silverGrad)" opacity="0.9"/>
    <text x="307" y="428" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#333">BẠC</text>
    <text x="307" y="442" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333" opacity="0.9">Hoàn 5% · Sinh nhật -10%</text>
    <text x="307" y="456" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#333" opacity="0.7">Tích x1.1 · Hết hạn 120 ngày</text>

    <rect x="20" y="472" width="185" height="58" rx="6" fill="url(#goldGrad2)" opacity="0.9"/>
    <text x="112" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#333">VÀNG</text>
    <text x="112" y="504" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333" opacity="0.9">Hoàn 7% · Sinh nhật -15%</text>
    <text x="112" y="518" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#333" opacity="0.7">Tích x1.3 · Hết hạn 180 ngày</text>

    <rect x="215" y="472" width="185" height="58" rx="6" fill="url(#platinumGrad)" opacity="0.9"/>
    <text x="307" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#0A0A0A">BẠCH KIM</text>
    <text x="307" y="504" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0A0A0A" opacity="0.9">Hoàn 10% · Sinh nhật -20%</text>
    <text x="307" y="518" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0A0A0A" opacity="0.7">Tích x1.5 · Vĩnh viễn</text>
  </g>

  <!-- SECTION 4: Check-in -->
  <g id="checkin">
    <rect x="20" y="540" width="380" height="22" rx="4" fill="#1A2A2A" stroke="#4A7C59" stroke-width="0.8"/>
    <text x="210" y="555" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4AFF8C" font-weight="600">📸 CHECK-IN · Tặng 20.000đ (06–13/06) · Hoặc giảm 10% (14–30/06)</text>
  </g>

  <!-- SECTION 5: Referral -->
  <g id="referral">
    <rect x="20" y="565" width="380" height="22" rx="4" fill="#1A1A2E" stroke="#6B9FB8" stroke-width="0.8"/>
    <text x="210" y="580" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#C9D6DF" font-weight="600">👥 GIỚI THIỆU BẠN · Bạn mua ≥30k → Bạn nhận 10.000đ cashback</text>
  </g>

  <!-- Footer bar -->
  <rect x="0" y="588" width="420" height="6" fill="url(#goldGrad)"/>
</svg>
