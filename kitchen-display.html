<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS — AURA SPACE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#0A0A0A;--col:#111;--card:#1A1A1A;
            --amber:#FFB300;--cyan:#00BCD4;--green:#4CAF50;--gray:#666;
            --red:#FF5252;--gold:#C9A200;
            --white:#F5F5F5;--txt:#9E9E9E;
            --fb:'Inter',-apple-system,sans-serif;
            --fm:'JetBrains Mono',monospace;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{font-size:15px}
        body{font-family:var(--fb);background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
        button{border:none;cursor:pointer;font-family:inherit;background:none}

        /* ══ TOPBAR ══ */
        .topbar{height:50px;background:var(--col);border-bottom:1px solid rgba(201,162,0,.1);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
        .topbar-left{display:flex;align-items:center;gap:10px}
        .topbar-brand{font-size:15px;font-weight:700;color:var(--gold);letter-spacing:2px}
        .topbar-sub{font-size:12px;color:var(--txt)}
        .topbar-clock{font-family:var(--fm);font-size:14px;color:var(--white)}

        /* ══ KANBAN ══ */
        .kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:0;flex:1;overflow:hidden}
        .column{display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.04);overflow:hidden}
        .column:last-child{border-right:none}
        .col-header{padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:2px solid}
        .col-header.new{border-color:var(--amber)}.col-header.progress{border-color:var(--cyan)}
        .col-header.ready{border-color:var(--green)}.col-header.done{border-color:var(--gray)}
        .col-title{font-size:14px;font-weight:700;color:var(--white);letter-spacing:1px;text-transform:uppercase}
        .col-badge{min-width:24px;height:24px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000}
        .col-badge.new{background:var(--amber)}.col-badge.progress{background:var(--cyan)}
        .col-badge.ready{background:var(--green)}.col-badge.done{background:var(--gray);color:#fff}
        .col-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
        .col-footer{padding:8px 12px;flex-shrink:0}
        .clear-btn{font-size:12px;color:var(--gray);text-align:center;width:100%;padding:6px;border-radius:6px;transition:all .2s}
        .clear-btn:hover{color:var(--red);background:rgba(255,82,82,.06)}

        /* ══ CARD ══ */
        .kds-card{background:var(--card);border-radius:10px;padding:14px 16px;border-left:4px solid;cursor:pointer;transition:transform .15s,box-shadow .15s;min-height:80px;position:relative}
        .kds-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
        .kds-card:active{transform:scale(.98)}
        .kds-card.new{border-left-color:var(--amber)}
        .kds-card.progress{border-left-color:var(--cyan)}
        .kds-card.ready{border-left-color:var(--green)}
        .kds-card.done{border-left-color:var(--gray);opacity:.5}
        .kds-card.late{border-left-color:var(--red);animation:latePulse 1.5s infinite}
        .kds-card.amber-pulse{animation:amberPulse 2s infinite}
        @keyframes latePulse{0%,100%{box-shadow:0 0 8px rgba(255,82,82,.2)}50%{box-shadow:0 0 20px rgba(255,82,82,.5)}}
        @keyframes amberPulse{0%,100%{box-shadow:0 0 6px rgba(255,179,0,.1)}50%{box-shadow:0 0 16px rgba(255,179,0,.3)}}
        .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
        .card-id{font-family:var(--fm);font-size:14px;font-weight:700}
        .card-id.new{color:var(--amber)}.card-id.progress{color:var(--cyan)}.card-id.ready{color:var(--green)}.card-id.done{color:var(--gray)}
        .card-time{font-size:12px;color:var(--txt)}
        .card-items{font-size:15px;color:var(--white);font-weight:500;line-height:1.5}
        .card-alert{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--red);margin-top:6px;padding:2px 8px;border-radius:4px;background:rgba(255,82,82,.1)}

        /* ══ BOTTOM BAR ══ */
        .bottombar{height:40px;background:var(--col);border-top:1px solid rgba(255,255,255,.04);display:flex;align-items:center;padding:0 20px;gap:20px;flex-shrink:0;font-size:12px}
        .bottom-stats{display:flex;gap:16px;flex:1}
        .bottom-stats span{color:var(--txt)}
        .bottom-stats strong{color:var(--white)}
        .progress-wrap{width:200px;display:flex;align-items:center;gap:8px}
        .progress-bar{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--amber));border-radius:3px;transition:width .5s ease}
        .progress-label{font-size:11px;color:var(--txt);white-space:nowrap}

        /* ══ RESPONSIVE ══ */
        @media(max-width:900px){
            .kanban{grid-template-columns:repeat(2,1fr)}
            .kds-card{min-height:60px;padding:10px 12px}
            .card-items{font-size:13px}
        }
        @media(max-width:600px){
            .kanban{grid-template-columns:1fr 1fr}
            .topbar-sub{display:none}
            .bottom-stats{flex-wrap:wrap;gap:8px}
            .progress-wrap{width:140px}
        }
    </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="topbar-left">
        <span class="topbar-brand">AURA SPACE · KDS</span>
        <span class="topbar-sub">Kitchen Display System</span>
    </div>
    <div class="topbar-clock" id="clock"></div>
</div>

<!-- KANBAN -->
<div class="kanban" id="kanban"></div>

<!-- BOTTOM BAR -->
<div class="bottombar">
    <div class="bottom-stats" id="bottomStats"></div>
    <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-label" id="progressLabel"></span>
    </div>
</div>

<script>
(function(){
'use strict';

var now=Date.now();
function minsAgo(m){return now-m*60000}

var COLUMNS=[
    {key:'new',label:'MỚI',color:'amber'},
    {key:'progress',label:'ĐANG LÀM',color:'cyan'},
    {key:'ready',label:'SẴN SÀNG',color:'green'},
    {key:'done',label:'HOÀN THÀNH',color:'gray'}
];

var orders=[
    {id:'A001',items:'2× Espresso, 1× Latte Art',status:'new',created:minsAgo(2)},
    {id:'A002',items:'1× Cold Brew, 1× Bánh Mì',status:'new',created:minsAgo(5)},
    {id:'A003',items:'3× Container Special',status:'new',created:minsAgo(8)},
    {id:'A009',items:'1× Combo Sáng, 1× Trà Sen Vàng',status:'new',created:minsAgo(0)},
    {id:'A004',items:'1× Dirty Matcha, 2× Latte Art',status:'progress',created:minsAgo(12)},
    {id:'A005',items:'1× Trà Sen Vàng, 1× Espresso',status:'progress',created:minsAgo(15)},
    {id:'A006',items:'1× Cold Brew, 1× Bánh Mì',status:'ready',created:minsAgo(20)},
    {id:'A007',items:'2× Espresso, 1× Combo A',status:'done',created:minsAgo(35)},
    {id:'A008',items:'1× Latte Art, 1× Trà Sen Vàng',status:'done',created:minsAgo(42)}
];
var completedTotal=12;
var dailyOrders=45;var dailyTarget=50;var dailyRevenue=2450000;

function fmt(n){return n.toLocaleString('vi-VN')+'₫'}
function elapsed(ts){
    var m=Math.floor((Date.now()-ts)/60000);
    if(m<1) return 'vừa xong';
    return m+' phút trước';
}

// ── CLOCK ──
function updateClock(){
    var d=new Date();
    var days=['CN','T2','T3','T4','T5','T6','T7'];
    var t=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
    var dt=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
    document.getElementById('clock').textContent=t+' · '+dt;
}
updateClock();setInterval(updateClock,1000);

// ── RENDER ──
function render(){
    var $kanban=document.getElementById('kanban');
    var html='';
    COLUMNS.forEach(function(col){
        var colOrders=orders.filter(function(o){return o.status===col.key});
        var count=col.key==='done'?completedTotal:colOrders.length;
        html+='<div class="column"><div class="col-header '+col.key+'"><span class="col-title">'+col.label+'</span><span class="col-badge '+col.key+'">'+count+'</span></div><div class="col-body">';
        var showOrders=col.key==='done'?colOrders.slice(0,3):colOrders;
        showOrders.forEach(function(o){
            var mins=Math.floor((Date.now()-o.created)/60000);
            var isLate=false;var isAmberPulse=false;
            if(o.status==='progress'&&mins>10) isLate=true;
            if(o.status==='new'&&mins>5) isAmberPulse=true;
            var cls='kds-card '+o.status;
            if(isLate) cls+=' late';
            else if(isAmberPulse) cls+=' amber-pulse';
            html+='<div class="'+cls+'" data-id="'+o.id+'">';
            html+='<div class="card-top"><span class="card-id '+o.status+'">#'+o.id+'</span><span class="card-time">'+elapsed(o.created)+'</span></div>';
            html+='<div class="card-items">'+o.items+'</div>';
            if(isLate) html+='<div class="card-alert">🚨 TRỄ GIỜ</div>';
            html+='</div>';
        });
        html+='</div>';
        if(col.key==='done') html+='<div class="col-footer"><button class="clear-btn" id="clearDone">Xóa Đã Hoàn Tất</button></div>';
        html+='</div>';
    });
    $kanban.innerHTML=html;

    // bind card clicks
    document.querySelectorAll('.kds-card').forEach(function(card){
        card.addEventListener('click',function(){advanceOrder(this.dataset.id)});
    });
    // clear done
    var clearBtn=document.getElementById('clearDone');
    if(clearBtn) clearBtn.addEventListener('click',clearCompleted);

    updateBottom();
}

function advanceOrder(id){
    var o=orders.find(function(x){return x.id===id});
    if(!o) return;
    var flow=['new','progress','ready','done'];
    var idx=flow.indexOf(o.status);
    if(idx<0||idx>=flow.length-1) return;
    o.status=flow[idx+1];
    if(o.status==='done'){
        completedTotal++;
        dailyOrders++;
        dailyRevenue+=Math.floor(Math.random()*40000)+30000;
    }
    render();
}

function clearCompleted(){
    orders=orders.filter(function(o){return o.status!=='done'});
    render();
}

function updateBottom(){
    var avgTime=4.2;
    document.getElementById('bottomStats').innerHTML=
        '<span>Hôm nay: <strong>'+dailyOrders+' đơn</strong></span>'+
        '<span>Doanh thu: <strong>'+fmt(dailyRevenue)+'</strong></span>'+
        '<span>Trung bình: <strong>'+avgTime.toFixed(1)+' phút/đơn</strong></span>';
    var pct=Math.min(Math.round(dailyOrders/dailyTarget*100),100);
    document.getElementById('progressFill').style.width=pct+'%';
    document.getElementById('progressLabel').textContent=dailyOrders+'/'+dailyTarget+' đơn ('+pct+'%)';
}

// ── Auto-refresh elapsed times ──
setInterval(render,30000);

// ── INIT ──
render();

})();
</script>
</body>
</html>
