<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực Đơn — AURA SPACE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#0A0A0A;--surface:#1A1A1A;--surface-hover:#222;
            --gold:#C9A200;--gold-e:#FFD700;--amber:#FFB300;
            --txt:#9E9E9E;--white:#F5F5F5;
            --orange:#FF6B35;--green:#4CAF50;--cyan:#00BCD4;--pink:#E91E63;
            --fr-orange:#FF9800;--best-val:#8BC34A;
            --grad:linear-gradient(135deg,#C9A200,#FFD700);
            --glow:0 0 30px rgba(201,162,0,.15);
            --fd:'Playfair Display',Georgia,serif;
            --fb:'Inter',-apple-system,sans-serif;
            --fm:'JetBrains Mono',monospace;
            --sidebar:280px;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{font-size:16px;scroll-behavior:smooth}
        body{font-family:var(--fb);background:var(--bg);color:var(--txt);line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased}
        a{text-decoration:none;color:inherit}
        button{border:none;cursor:pointer;font-family:inherit;background:none}
        ul{list-style:none}

        /* ══ LAYOUT ══ */
        .app{display:flex;min-height:100vh}
        .sidebar{width:var(--sidebar);position:fixed;top:0;left:0;height:100vh;background:var(--surface);border-right:1px solid rgba(201,162,0,.1);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
        .main{margin-left:var(--sidebar);flex:1;min-height:100vh;padding:32px 40px 120px}

        /* ══ SIDEBAR ══ */
        .sb-logo{padding:28px 24px 20px;font-family:var(--fd);font-size:18px;color:var(--gold);letter-spacing:6px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.05)}
        .sb-search{padding:16px 20px;position:relative}
        .sb-search input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(201,162,0,.15);border-radius:8px;padding:10px 14px 10px 36px;font-size:13px;color:var(--white);outline:none;transition:border .3s}
        .sb-search input:focus{border-color:var(--gold)}
        .sb-search::before{content:'\1F50D';position:absolute;left:32px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
        .sb-label{padding:8px 24px;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
        .sb-cats{flex:1;padding:4px 12px}
        .sb-cat{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:8px;font-size:14px;font-weight:500;color:var(--txt);cursor:pointer;transition:all .2s;border-left:3px solid transparent;margin-bottom:2px;width:100%;text-align:left}
        .sb-cat:hover{color:var(--white);background:rgba(255,255,255,.03)}
        .sb-cat.active{color:var(--gold);background:rgba(201,162,0,.06);border-left-color:var(--gold)}
        .sb-cat .cnt{margin-left:auto;font-size:11px;color:rgba(158,158,158,.5);font-weight:600}
        .sb-user{padding:16px 20px;border-top:1px solid rgba(255,255,255,.05);font-size:12px;color:var(--txt)}
        .sb-user-name{font-weight:600;color:var(--white);font-size:13px}

        /* ══ HEADER BAR ══ */
        .header-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px}
        .header-title{font-family:var(--fd);font-size:28px;color:var(--white);font-weight:400}
        .header-title span{color:var(--txt);font-family:var(--fb);font-size:14px;font-weight:400;margin-left:8px}
        .header-actions{display:flex;gap:8px}
        .header-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--txt);background:var(--surface);border:1px solid rgba(255,255,255,.08);transition:all .2s}
        .header-btn:hover{border-color:rgba(201,162,0,.3);color:var(--white)}
        .header-btn.active-filter{border-color:var(--gold);color:var(--gold)}

        /* ══ GRID ══ */
        .menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
        .menu-empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--txt);font-size:15px}

        /* ══ CARD ══ */
        .card{background:var(--surface);border:1px solid rgba(201,162,0,.15);border-radius:14px;padding:24px 22px 20px;position:relative;transition:transform .25s,box-shadow .25s,border-color .25s;cursor:default;opacity:0;animation:cardIn .4s ease forwards}
        .card:hover{transform:translateY(-2px);border-color:rgba(201,162,0,.35);box-shadow:var(--glow)}
        @keyframes cardIn{to{opacity:1}}
        .card:nth-child(1){animation-delay:.03s}.card:nth-child(2){animation-delay:.06s}.card:nth-child(3){animation-delay:.09s}
        .card:nth-child(4){animation-delay:.12s}.card:nth-child(5){animation-delay:.15s}.card:nth-child(6){animation-delay:.18s}
        .card:nth-child(7){animation-delay:.21s}.card:nth-child(8){animation-delay:.24s}
        .card-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#fff;padding:3px 10px;border-radius:20px;margin-bottom:14px}
        .badge-best-seller{background:var(--orange);animation:pulse 2.5s infinite}
        .badge-popular{background:var(--green)}
        .badge-specialty{background:var(--cyan)}
        .badge-signature{background:var(--pink)}
        .badge-classic{background:#78909C}
        .badge-trending{background:#AB47BC}
        .badge-vietnamese{background:#E65100}
        .badge-refreshing{background:#00897B}
        .badge-winter{background:#5C6BC0}
        .badge-french{background:var(--fr-orange)}
        .badge-chef{background:#D81B60}
        .badge-filling{background:#6D4C41}
        .badge-healthy{background:var(--green)}
        .badge-sharing{background:#FFA726}
        .badge-best-value{background:var(--best-val)}
        .badge-for-two{background:var(--pink)}
        .badge-sunset{background:var(--orange)}
        .badge-group{background:var(--cyan)}
        .badge-house{background:var(--gold);color:var(--bg)}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.8}}
        .card-emoji{font-size:36px;margin-bottom:12px;display:block}
        .card-name{font-size:15px;font-weight:600;color:var(--white);margin-bottom:6px;line-height:1.3}
        .card-desc{font-size:13px;color:var(--txt);line-height:1.5;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .card-footer{display:flex;align-items:center;justify-content:space-between}
        .card-price{font-family:var(--fm);font-size:15px;font-weight:500;color:var(--gold)}
        .card-original{font-family:var(--fm);font-size:12px;color:rgba(158,158,158,.5);text-decoration:line-through;margin-left:8px}
        .card-save{font-size:10px;font-weight:700;color:var(--best-val);margin-left:6px}
        .card-add{width:36px;height:36px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:400;transition:transform .2s,box-shadow .2s;flex-shrink:0}
        .card-add:hover{transform:scale(1.1);box-shadow:0 0 16px rgba(255,107,53,.3)}

        /* ══ CART FLOAT ══ */
        .cart-float{position:fixed;bottom:24px;right:24px;z-index:200}
        .cart-btn{width:56px;height:56px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(201,162,0,.3);transition:transform .2s;font-size:22px;color:var(--bg)}
        .cart-btn:hover{transform:scale(1.05)}
        .cart-badge{position:absolute;top:-4px;right:-4px;min-width:20px;height:20px;border-radius:10px;background:var(--orange);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;opacity:0;transform:scale(0);transition:all .25s}
        .cart-badge.show{opacity:1;transform:scale(1)}

        /* ══ CART PANEL ══ */
        .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;opacity:0;visibility:hidden;transition:all .3s}
        .cart-overlay.open{opacity:1;visibility:visible}
        .cart-panel{position:fixed;top:0;right:-420px;width:400px;max-width:90vw;height:100vh;background:var(--surface);z-index:301;transition:right .35s ease;display:flex;flex-direction:column;border-left:1px solid rgba(201,162,0,.1)}
        .cart-panel.open{right:0}
        .cart-header{padding:24px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between}
        .cart-header h2{font-family:var(--fd);font-size:20px;color:var(--white);font-weight:400}
        .cart-close{font-size:24px;color:var(--txt);padding:4px;transition:color .2s}
        .cart-close:hover{color:var(--white)}
        .cart-items{flex:1;overflow-y:auto;padding:16px 24px}
        .cart-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04)}
        .cart-item-emoji{font-size:28px;flex-shrink:0}
        .cart-item-info{flex:1;min-width:0}
        .cart-item-name{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .cart-item-sub{font-family:var(--fm);font-size:12px;color:var(--gold);margin-top:2px}
        .cart-qty{display:flex;align-items:center;gap:8px;flex-shrink:0}
        .cart-qty button{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.06);color:var(--white);font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .2s}
        .cart-qty button:hover{background:rgba(255,255,255,.12)}
        .cart-qty span{font-size:13px;font-weight:600;color:var(--white);min-width:18px;text-align:center}
        .cart-empty{text-align:center;padding:60px 20px;color:var(--txt);font-size:14px}
        .cart-summary{padding:20px 24px;border-top:1px solid rgba(255,255,255,.05)}
        .cart-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;color:var(--txt)}
        .cart-total{display:flex;justify-content:space-between;font-size:18px;font-weight:600;color:var(--white);margin:12px 0 16px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)}
        .cart-total span:last-child{font-family:var(--fm);color:var(--gold)}
        .cart-checkout{display:block;width:100%;padding:14px;border-radius:12px;background:var(--grad);color:var(--bg);font-size:14px;font-weight:600;letter-spacing:1px;text-align:center;transition:transform .2s,box-shadow .2s}
        .cart-checkout:hover{transform:scale(1.01);box-shadow:0 0 20px rgba(201,162,0,.3)}

        /* ══ TOAST ══ */
        .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid rgba(201,162,0,.2);color:var(--white);padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

        /* ══ SORT DROPDOWN ══ */
        .sort-drop{position:relative;display:inline-block}
        .sort-menu{position:absolute;top:calc(100% + 4px);right:0;background:var(--surface);border:1px solid rgba(201,162,0,.15);border-radius:10px;padding:6px 0;min-width:180px;z-index:50;opacity:0;visibility:hidden;transform:translateY(-4px);transition:all .2s}
        .sort-drop.open .sort-menu{opacity:1;visibility:visible;transform:translateY(0)}
        .sort-opt{display:block;width:100%;text-align:left;padding:10px 16px;font-size:13px;color:var(--txt);transition:all .15s}
        .sort-opt:hover{color:var(--white);background:rgba(255,255,255,.04)}
        .sort-opt.active{color:var(--gold)}

        /* ══ MOBILE ══ */
        .mobile-tabs{display:none;position:fixed;top:0;left:0;width:100%;background:var(--surface);z-index:100;border-bottom:1px solid rgba(201,162,0,.1)}
        .mobile-top{padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
        .mobile-logo{font-family:var(--fd);font-size:16px;color:var(--gold);letter-spacing:4px}
        .mobile-cart-btn{font-size:20px;position:relative;color:var(--white)}
        .mobile-cart-badge{position:absolute;top:-6px;right:-8px;min-width:16px;height:16px;border-radius:8px;background:var(--orange);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px}
        .mobile-search{padding:0 16px 10px;position:relative}
        .mobile-search input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(201,162,0,.15);border-radius:8px;padding:9px 14px 9px 34px;font-size:13px;color:var(--white);outline:none}
        .mobile-search::before{content:'\1F50D';position:absolute;left:28px;top:7px;font-size:13px;pointer-events:none}
        .mobile-cats{display:flex;gap:4px;padding:0 16px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
        .mobile-cats::-webkit-scrollbar{display:none}
        .mobile-cats::after{content:'';flex-shrink:0;width:16px}
        .mobile-cat{white-space:nowrap;padding:8px 12px;border-radius:20px;font-size:12px;font-weight:500;color:var(--txt);background:rgba(255,255,255,.04);border:1px solid transparent;transition:all .2s;flex-shrink:0}
        .mobile-cat.active{color:var(--gold);background:rgba(201,162,0,.08);border-color:rgba(201,162,0,.3)}

        @media(max-width:1024px){
            .sidebar{display:none}
            .main{margin-left:0;padding:16px 16px 120px;padding-top:160px}
            .mobile-tabs{display:block}
            .menu-grid{grid-template-columns:repeat(2,1fr);gap:14px}
            .header-title{font-size:22px}
            .cart-float{bottom:16px;right:16px}
        }
        @media(max-width:480px){
            .menu-grid{grid-template-columns:1fr;gap:12px}
            .main{padding-top:170px}
            .card{padding:20px 18px 16px}
            .header-actions{display:none}
        }
    </style>
</head>
<body>

<div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sb-logo">AURA SPACE</div>
        <div class="sb-search">
            <input type="text" id="searchDesktop" placeholder="Tìm món...">
        </div>
        <div class="sb-label">THỰC ĐƠN</div>
        <nav class="sb-cats" id="sbCats"></nav>
        <div class="sb-user">
            <div class="sb-user-name">KH — Khách Hàng</div>
            Thành viên Gold &#9733;
        </div>
    </aside>

    <!-- MOBILE TABS -->
    <div class="mobile-tabs" id="mobileTabs">
        <div class="mobile-top">
            <span class="mobile-logo">AURA SPACE</span>
            <button class="mobile-cart-btn" id="mobileCartBtn">&#128722;<span class="mobile-cart-badge" id="mobileCartBadge" style="display:none">0</span></button>
        </div>
        <div class="mobile-search">
            <input type="text" id="searchMobile" placeholder="Tìm món...">
        </div>
        <div class="mobile-cats" id="mobileCats"></div>
    </div>

    <!-- MAIN -->
    <main class="main">
        <div class="header-bar">
            <h1 class="header-title" id="headerTitle"></h1>
            <div class="header-actions">
                <div class="sort-drop" id="sortDrop">
                    <button class="header-btn" id="sortBtn">&#8693; Sắp xếp</button>
                    <div class="sort-menu" id="sortMenu">
                        <button class="sort-opt active" data-sort="default">Mặc định</button>
                        <button class="sort-opt" data-sort="price-asc">Giá tăng</button>
                        <button class="sort-opt" data-sort="price-desc">Giá giảm</button>
                        <button class="sort-opt" data-sort="popular">Bán chạy nhất</button>
                    </div>
                </div>
                <button class="header-btn" id="filterBtn">Lọc</button>
            </div>
        </div>
        <div class="menu-grid" id="menuGrid"></div>
    </main>
</div>

<!-- CART FLOAT -->
<div class="cart-float" id="cartFloat">
    <button class="cart-btn" id="cartBtn">&#128722;</button>
    <span class="cart-badge" id="cartBadge">0</span>
</div>

<!-- CART OVERLAY + PANEL -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-panel" id="cartPanel">
    <div class="cart-header">
        <h2>Giỏ Hàng</h2>
        <button class="cart-close" id="cartClose">&times;</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-summary" id="cartSummary" style="display:none">
        <div class="cart-row"><span>Tạm tính</span><span id="cartSubtotal">0</span></div>
        <div class="cart-row"><span>Phí phục vụ 5%</span><span id="cartFee">0</span></div>
        <div class="cart-total"><span>Tổng cộng</span><span id="cartTotal">0</span></div>
        <button class="cart-checkout">Thanh Toán &rarr;</button>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

// ── API Config ──
var IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
var API_BASE = IS_LOCAL ? 'http://127.0.0.1:8787/api' : 'https://aura-space-worker.sadec-marketing-hub.workers.dev/api';

// Category emoji map
var CAT_EMOJI = {coffee:'\u2615',signature:'\uD83C\uDF79',food:'\uD83E\uDD50',snacks:'\uD83E\uDD50',combo:'\uD83C\uDFAF'};
var CAT_SUB   = {coffee:'Specialty & Vietnamese classics',signature:'Exclusive house drinks',food:'Pastries, snacks & bites',snacks:'Pastries, snacks & bites',combo:'Save more, enjoy more'};
var BADGE_CLASS = {'Best Seller':'badge-best-seller','Popular':'badge-popular','Specialty':'badge-specialty','Signature':'badge-signature','Classic':'badge-classic','Vietnamese':'badge-vietnamese','Trending':'badge-trending','Refreshing':'badge-refreshing','French Style':'badge-french',"Chef's Pick":'badge-chef','Healthy':'badge-healthy','Sharing':'badge-sharing','Best Value':'badge-best-value','For Two':'badge-for-two','Sunset Deal':'badge-sunset','Group':'badge-group','House Special':'badge-house','Winter':'badge-winter','Filling':'badge-filling','Slow Brew':'badge-slow-brew','Morning':'badge-morning'};

var MENU = [];
var CATS = [];

// Fetch menu from API, fallback to empty
async function loadMenu() {
    try {
        var res = await fetch(API_BASE + '/menu');
        var data = await res.json();
        if (data.success && data.items) {
            MENU = data.items.map(function(m, i) {
                return {
                    id: m.id || i+1,
                    cat: (m.category || '').toLowerCase(),
                    emoji: CAT_EMOJI[(m.category||'').toLowerCase()] || '\uD83C\uDF75',
                    name: m.name,
                    desc: m.description || '',
                    price: m.price,
                    badge: m.badge || '',
                    bc: BADGE_CLASS[m.badge] || ''
                };
            });
        }
    } catch(e) {
        console.warn('API unavailable, using empty menu:', e.message);
    }

    // Build CATS from actual data
    var catMap = {};
    MENU.forEach(function(m) {
        if (!catMap[m.cat]) catMap[m.cat] = {key:m.cat, icon:CAT_EMOJI[m.cat]||'\uD83C\uDF75', label:m.cat.charAt(0).toUpperCase()+m.cat.slice(1), count:0, sub:CAT_SUB[m.cat]||''};
        catMap[m.cat].count++;
    });
    CATS = Object.values(catMap);
    if (CATS.length) activeCat = CATS[0].key;
}

var activeCat='coffee',currentSort='default',filterBadge='',searchQ='',cart=[];

var $grid=document.getElementById('menuGrid');
var $title=document.getElementById('headerTitle');
var $sbCats=document.getElementById('sbCats');
var $mobCats=document.getElementById('mobileCats');
var $cartBadge=document.getElementById('cartBadge');
var $mobCartBadge=document.getElementById('mobileCartBadge');
var $cartItems=document.getElementById('cartItems');
var $cartSummary=document.getElementById('cartSummary');
var $cartSubtotal=document.getElementById('cartSubtotal');
var $cartFee=document.getElementById('cartFee');
var $cartTotal=document.getElementById('cartTotal');
var $cartPanel=document.getElementById('cartPanel');
var $cartOverlay=document.getElementById('cartOverlay');
var $toast=document.getElementById('toast');
var $sortDrop=document.getElementById('sortDrop');

function buildCatNav(){
CATS.forEach(function(c){
    var el=document.createElement('button');
    el.className='sb-cat'+(c.key===activeCat?' active':'');
    el.dataset.cat=c.key;
    el.innerHTML=c.icon+' '+c.label+'<span class="cnt">'+c.count+'</span>';
    el.onclick=function(){setCat(c.key)};
    $sbCats.appendChild(el);

    var mob=document.createElement('button');
    mob.className='mobile-cat'+(c.key===activeCat?' active':'');
    mob.dataset.cat=c.key;
    mob.textContent=c.icon+' '+c.label;
    mob.onclick=function(){setCat(c.key)};
    $mobCats.appendChild(mob);
});
} // end buildCatNav

function setCat(key){
    activeCat=key;filterBadge='';searchQ='';
    document.getElementById('searchDesktop').value='';
    document.getElementById('searchMobile').value='';
    document.querySelectorAll('.sb-cat,.mobile-cat').forEach(function(el){
        el.classList.toggle('active',el.dataset.cat===key);
    });
    updateFilter();render();
}

function updateTitle(){
    var c=CATS.find(function(x){return x.key===activeCat});
    if(c) $title.innerHTML=c.icon+' '+c.label+'<span>'+c.count+' món \u00B7 '+c.sub+'</span>';
}

function updateFilter(){
    var btn=document.getElementById('filterBtn');
    if(btn){
        btn.className='header-btn'+(filterBadge?' active-filter':'');
        btn.textContent='Lọc'+(filterBadge?' \u00B7 '+filterBadge:'');
    }
}

function render(){
    updateTitle();
    var items;
    if(searchQ){
        var q=searchQ.toLowerCase();
        items=MENU.filter(function(m){return m.name.toLowerCase().indexOf(q)!==-1||m.desc.toLowerCase().indexOf(q)!==-1});
    } else {
        items=MENU.filter(function(m){return m.cat===activeCat});
    }
    if(filterBadge){
        items=items.filter(function(m){return m.badge===filterBadge});
    }
    if(currentSort==='price-asc') items.sort(function(a,b){return a.price-b.price});
    else if(currentSort==='price-desc') items.sort(function(a,b){return b.price-a.price});
    else if(currentSort==='popular') items.sort(function(a,b){
        var pa=(a.badge==='Best Seller'||a.badge==='Popular')?0:1;
        var pb=(b.badge==='Best Seller'||b.badge==='Popular')?0:1;
        return pa-pb;
    });
    $grid.innerHTML='';
    if(!items.length){
        $grid.innerHTML='<div class="menu-empty">Không tìm thấy món nào.</div>';
        return;
    }
    items.forEach(function(m){
        var card=document.createElement('div');
        card.className='card';
        var badgeHtml=m.badge?'<span class="card-badge '+m.bc+'">'+m.badge+'</span>':'';
        var origHtml=m.orig?'<span class="card-original">'+fmt(m.orig)+'</span><span class="card-save">-'+Math.round((1-m.price/m.orig)*100)+'%</span>':'';
        card.innerHTML=badgeHtml+
            '<span class="card-emoji">'+m.emoji+'</span>'+
            '<div class="card-name">'+m.name+'</div>'+
            '<div class="card-desc">'+m.desc+'</div>'+
            '<div class="card-footer"><div><span class="card-price">'+fmt(m.price)+'</span>'+origHtml+'</div>'+
            '<button class="card-add" aria-label="Them '+m.name+'">+</button></div>';
        card.querySelector('.card-add').addEventListener('click',function(){addToCart(m.id)});
        $grid.appendChild(card);
    });
}

function fmt(n){return n.toLocaleString('vi-VN')+'\u20AB'}

function addToCart(id){
    var item=cart.find(function(c){return c.id===id});
    if(item) item.qty++;
    else cart.push({id:id,qty:1});
    updateCartUI();
    var m=MENU.find(function(x){return x.id===id});
    showToast('Đã thêm '+m.name);
}
function changeQty(id,delta){
    var item=cart.find(function(c){return c.id===id});
    if(!item) return;
    item.qty+=delta;
    if(item.qty<=0) cart=cart.filter(function(c){return c.id!==id});
    updateCartUI();
}
window._cq=changeQty;

function updateCartUI(){
    var count=0;
    cart.forEach(function(c){count+=c.qty});
    $cartBadge.textContent=count;
    $cartBadge.classList.toggle('show',count>0);
    $mobCartBadge.textContent=count;
    $mobCartBadge.style.display=count>0?'flex':'none';
    renderCartPanel();
}

function renderCartPanel(){
    if(!cart.length){
        $cartItems.innerHTML='<div class="cart-empty">Giỏ hàng trống.</div>';
        $cartSummary.style.display='none';
        return;
    }
    $cartSummary.style.display='block';
    var html='',subtotal=0;
    cart.forEach(function(c){
        var m=MENU.find(function(x){return x.id===c.id});
        var lineTotal=m.price*c.qty;
        subtotal+=lineTotal;
        html+='<div class="cart-item">'+
            '<span class="cart-item-emoji">'+m.emoji+'</span>'+
            '<div class="cart-item-info"><div class="cart-item-name">'+m.name+'</div><div class="cart-item-sub">'+fmt(lineTotal)+'</div></div>'+
            '<div class="cart-qty"><button onclick="window._cq('+m.id+',-1)">\u2212</button><span>'+c.qty+'</span><button onclick="window._cq('+m.id+',1)">+</button></div></div>';
    });
    $cartItems.innerHTML=html;
    var fee=Math.round(subtotal*0.05);
    $cartSubtotal.textContent=fmt(subtotal);
    $cartFee.textContent=fmt(fee);
    $cartTotal.textContent=fmt(subtotal+fee);
}

function openCart(){$cartPanel.classList.add('open');$cartOverlay.classList.add('open')}
function closeCart(){$cartPanel.classList.remove('open');$cartOverlay.classList.remove('open')}
document.getElementById('cartBtn').addEventListener('click',openCart);
document.getElementById('mobileCartBtn').addEventListener('click',openCart);
document.getElementById('cartClose').addEventListener('click',closeCart);
$cartOverlay.addEventListener('click',closeCart);

var toastTimer;
function showToast(msg){
    $toast.textContent=msg;
    $toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(function(){$toast.classList.remove('show')},2000);
}

var searchTimer;
function onSearch(val){
    clearTimeout(searchTimer);
    searchTimer=setTimeout(function(){
        searchQ=val.trim();
        render();
    },250);
}
document.getElementById('searchDesktop').addEventListener('input',function(){onSearch(this.value)});
document.getElementById('searchMobile').addEventListener('input',function(){onSearch(this.value)});

document.getElementById('sortBtn').addEventListener('click',function(e){
    e.stopPropagation();
    $sortDrop.classList.toggle('open');
});
document.addEventListener('click',function(){$sortDrop.classList.remove('open')});
document.querySelectorAll('.sort-opt').forEach(function(el){
    el.addEventListener('click',function(){
        currentSort=this.dataset.sort;
        document.querySelectorAll('.sort-opt').forEach(function(o){o.classList.remove('active')});
        this.classList.add('active');
        $sortDrop.classList.remove('open');
        render();
    });
});

var filterCycle=['','Best Seller','Popular'];
var filterIdx=0;
document.getElementById('filterBtn').addEventListener('click',function(){
    filterIdx=(filterIdx+1)%filterCycle.length;
    filterBadge=filterCycle[filterIdx];
    updateFilter();render();
});

// ── Init: load from API then render ──
loadMenu().then(function(){
    buildCatNav();
    render();
});
})();
</script>
</body>
</html>
