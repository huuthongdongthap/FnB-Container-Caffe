<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>KDS · AURA SPACE Kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/brand-tokens.css">
  <link rel="stylesheet" href="/css/kds-m3.css?v=2.2.1">
  <link rel="stylesheet" href="/css/kds-styles.css?v=2.2.1">
  <link rel="icon" type="image/svg+xml" href="/assets/brand/favicon.svg">
  <style>
    :root{
      --bg:#0A0A0A; --card:#1A1A1A; --gold:#C9A200;
      --electric-gold:#FFD700; --amber:#FFB300;
      --text:#F5F5F5; --muted:#8A8A8A;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
    .kds-header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:linear-gradient(180deg,#141414 0%,var(--bg) 100%);border-bottom:1px solid rgba(201,162,0,.3);position:sticky;top:0;z-index:100}
    .kds-brand{display:flex;align-items:center;gap:12px;font-family:'Playfair Display',serif;font-size:20px;color:var(--electric-gold)}
    .kds-brand b{color:var(--gold);letter-spacing:2px}
    .kds-clock{font-family:'JetBrains Mono',monospace;font-size:28px;color:var(--electric-gold);font-weight:700;letter-spacing:2px}
    .kds-stats{display:flex;gap:16px;font-size:13px;color:var(--muted)}
    .kds-stats b{color:var(--amber);font-family:'JetBrains Mono',monospace;font-size:15px}
    .kds-controls{display:flex;gap:8px;align-items:center}
    .kds-btn{background:var(--card);color:var(--text);border:1px solid rgba(201,162,0,.3);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:.2s}
    .kds-btn:hover{background:var(--gold);color:#000;border-color:var(--gold)}
    .kds-board{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:20px 24px}
    .kds-col{background:var(--card);border-radius:12px;padding:16px;min-height:70vh;border-top:3px solid var(--gold)}
    .kds-col[data-col="pending"]{border-top-color:#EF4444}
    .kds-col[data-col="preparing"]{border-top-color:var(--amber)}
    .kds-col[data-col="ready"]{border-top-color:#22C55E}
    .kds-col[data-col="served"]{border-top-color:var(--muted)}
    .kds-col h3{font-family:'Playfair Display',serif;font-size:14px;color:var(--text);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;text-transform:uppercase;letter-spacing:1.5px}
    .kds-col h3 span{background:rgba(255,215,0,.15);color:var(--electric-gold);padding:2px 10px;border-radius:20px;font-size:11px;font-family:'JetBrains Mono',monospace}
    .kds-cards{display:flex;flex-direction:column;gap:10px}
    .order-card{background:#141414;border:1px solid rgba(255,255,255,.05);border-left:3px solid var(--gold);padding:12px;border-radius:8px;cursor:pointer;transition:.2s}
    .order-card:hover{transform:translateX(2px);border-left-color:var(--electric-gold)}
    .order-card.urgent{border-left-color:#EF4444;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}
    .order-id{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:4px}
    .order-title{font-weight:700;color:var(--text);font-size:13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
    .order-timer{font-family:'JetBrains Mono',monospace;color:var(--amber);font-size:12px}
    .order-items{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px}
    .order-items li{list-style:none;padding:2px 0;border-bottom:1px dashed rgba(255,255,255,.05)}
    .order-items li:last-child{border-bottom:0}
    .order-items b{color:var(--text)}
    .order-actions{display:flex;gap:6px;margin-top:8px}
    .order-btn{flex:1;padding:6px 8px;border-radius:6px;border:0;cursor:pointer;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;transition:.15s}
    .order-btn.next{background:var(--gold);color:#000}
    .order-btn.next:hover{background:var(--electric-gold)}
    .order-btn.cancel{background:transparent;color:#EF4444;border:1px solid rgba(239,68,68,.3)}
    .order-btn.cancel:hover{background:#EF4444;color:#fff}
    .kds-empty{color:var(--muted);font-size:12px;font-style:italic;padding:40px 0;text-align:center}
    .toast-dock{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:1000}
    .toast-kds{background:var(--card);border-left:3px solid var(--gold);padding:12px 16px;border-radius:8px;color:var(--text);font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.5);min-width:240px}
    @media(max-width:1200px){.kds-board{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:768px){.kds-board{grid-template-columns:1fr}.kds-clock{font-size:20px}.kds-stats{display:none}}
  </style>
</head>
<body>
  <header class="kds-header">
    <div class="kds-brand"><span>🍳</span><b>AURA</b>&nbsp;KDS</div>
    <div class="kds-clock" id="kdsClock">--:--:--</div>
    <div class="kds-stats">
      <div>Chờ: <b id="statPending">0</b></div>
      <div>Đang làm: <b id="statPreparing">0</b></div>
      <div>Sẵn sàng: <b id="statReady">0</b></div>
      <div>Avg: <b id="statAvgTime">0m</b></div>
    </div>
    <div class="kds-controls">
      <button class="kds-btn" id="toggleSound" title="Toggle sound">🔔</button>
      <button class="kds-btn" id="toggleFullscreen" title="Toàn màn hình">⛶</button>
      <button class="kds-btn" id="refreshKDS" title="Refresh">↻</button>
    </div>
  </header>

  <main class="kds-board" id="kdsBoard">
    <div class="kds-col" data-col="pending">
      <h3>Chờ xác nhận <span id="cntPending">0</span></h3>
      <div class="kds-cards" id="colPending"><div class="kds-empty">Không có đơn chờ</div></div>
    </div>
    <div class="kds-col" data-col="preparing">
      <h3>Đang chuẩn bị <span id="cntPreparing">0</span></h3>
      <div class="kds-cards" id="colPreparing"><div class="kds-empty">Không có đơn</div></div>
    </div>
    <div class="kds-col" data-col="ready">
      <h3>Sẵn sàng <span id="cntReady">0</span></h3>
      <div class="kds-cards" id="colReady"><div class="kds-empty">Không có đơn</div></div>
    </div>
    <div class="kds-col" data-col="served">
      <h3>Đã phục vụ <span id="cntServed">0</span></h3>
      <div class="kds-cards" id="colServed"><div class="kds-empty">Không có đơn</div></div>
    </div>
  </main>

  <div class="toast-dock" id="toastDock"></div>

  <script type="module" src="/js/kds-app.js?v=2.2.1"></script>
</body>
</html>
